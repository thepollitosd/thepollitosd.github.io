<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chess Engine</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<style>
  :root { 
    --bg: #1e1e24; --panel: #2b2b36; --text: #e0e0e0; --accent: #4caf50; 
    --light-sq: #eeeed2; --dark-sq: #769656; 
  }
  html { touch-action: manipulation; overscroll-behavior: none; }
  body { margin: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
  
  #header { display: flex; justify-content: space-between; padding: 10px 15px; background: #1a1a20; align-items: center; z-index: 100; border-bottom: 1px solid #333;}
  #header h1 { margin: 0; font-size: 1.2em; font-weight: 600;}
  .menu-btn { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
  
  #main-container { display: flex; flex: 1; flex-direction: row; overflow: hidden; position: relative; }
  .side-panel { width: 320px; background: var(--panel); padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; transition: transform 0.3s ease; z-index: 10;}
  #center-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow-y: auto; padding: 20px 10px;}
  
  #status-container { width: 100%; max-width: 520px; margin-bottom: 10px; box-sizing: border-box;}
  #board-container { position: relative; width: 100%; max-width: 520px; touch-action: none; }
  #board { width: 100%; }
  #arrow-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  
  .white-1e1d7 { background-color: var(--light-sq) !important; color: var(--dark-sq) !important; }
  .black-3c85d { background-color: var(--dark-sq) !important; color: var(--light-sq) !important; }
  
  /* Highlights & Move Dots */
  .premove-square { box-shadow: inset 0 0 0 50px rgba(220, 50, 50, 0.6) !important; }
  .highlight-selected { background-color: rgba(200, 200, 50, 0.5) !important; }
  .highlight-dot::after { content: ''; position: absolute; top: 35%; left: 35%; width: 30%; height: 30%; background: rgba(0,0,0,0.3); border-radius: 50%; pointer-events: none; }
  .highlight-capture::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 6px solid rgba(0,0,0,0.25); box-sizing: border-box; border-radius: 50%; pointer-events: none; }

  h2, h3 { margin: 0; padding-bottom: 5px; border-bottom: 1px solid #444; font-weight: 500;}
  .box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
  
  /* Settings Accordions */
  details { background: rgba(0,0,0,0.15); border-radius: 6px; margin-bottom: 5px; }
  summary { padding: 10px; font-weight: bold; cursor: pointer; outline: none; user-select: none; }
  summary:hover { background: rgba(255,255,255,0.05); }
  .details-content { padding: 10px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #444; }

  .setting { display: flex; flex-direction: column; gap: 5px; }
  .setting label { font-size: 0.85em; color: #bbb; display: flex; justify-content: space-between; align-items: center;}
  input[type="range"] { accent-color: var(--accent); height: 15px; cursor: pointer;} 
  input[type="checkbox"] { transform: scale(1.3); accent-color: var(--accent); cursor: pointer;}
  select { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; cursor: pointer;}
  
  button.primary { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: auto;}
  button.primary:hover { filter: brightness(1.2); }
  button.secondary { background: #444; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: left; display: flex; justify-content: space-between;}
  button.secondary:hover { background: #555; }
  
  #moves { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-family: monospace; font-size: 1.1em; max-height: 100%; overflow-y: auto;}
  .move-num { color: #888; text-align: right; padding-right: 10px;}
  #commentary { font-style: italic; color: #aaa; margin-top: 10px; font-size: 0.95em; line-height: 1.4; min-height: 40px; word-wrap: break-word;}
  #status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; background: #555; font-size: 0.9em; margin-bottom: 10px; font-weight: bold;}
  #eval-bar { font-size: 1.1em; font-weight: bold; }

  /* Persona Modal Styles */
  #persona-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(3px); opacity: 0; transition: opacity 0.2s;}
  #persona-modal.visible { display: flex; opacity: 1; }
  .modal-content { background: var(--panel); width: 90%; max-width: 500px; max-height: 85vh; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  .modal-header { padding: 15px 20px; background: #1a1a20; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
  .modal-header h2 { margin: 0; font-size: 1.3em; border: none; padding: 0; }
  .close-btn { background: none; border: none; color: #aaa; font-size: 1.5em; cursor: pointer; padding: 0;}
  .close-btn:hover { color: white; }
  .modal-body { padding: 0; overflow-y: auto; flex: 1; }
  .persona-group { padding: 10px 20px; background: rgba(0,0,0,0.5); font-weight: bold; color: var(--accent); position: sticky; top: 0; z-index: 2; border-bottom: 1px solid #333; text-transform: uppercase; font-size: 0.85em; letter-spacing: 1px;}
  .persona-item { padding: 12px 20px; cursor: pointer; border-bottom: 1px solid #333; transition: background 0.1s; }
  .persona-item:hover { background: rgba(255,255,255,0.08); }
  .persona-name { font-weight: bold; font-size: 1.05em; color: #eee; }
  .persona-desc { font-size: 0.85em; color: #888; margin-top: 4px; }

  @media (max-width: 1024px) {
    #left-panel { position: absolute; left: 0; height: 100%; transform: translateX(-100%); z-index: 20;}
    #right-panel { position: absolute; right: 0; height: 100%; transform: translateX(100%); z-index: 20;}
    .side-panel.open { transform: translateX(0) !important; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
  }
  @media (min-width: 1025px) { #header { display: none; } }
</style>
</head>

<body>

<div id="header">
  <button class="menu-btn" onclick="togglePanel('left-panel')">☰ Log</button>
  <h1>V2.2a</h1>
  <button class="menu-btn" onclick="togglePanel('right-panel')">⚙️ Set</button>
</div>

<!-- PERSONA SELECTOR MODAL -->
<div id="persona-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Select Bot Persona</h2>
      <button class="close-btn" onclick="closePersonaModal()">×</button>
    </div>
    <div class="modal-body" id="persona-list">
      <!-- Populated by JavaScript -->
    </div>
  </div>
</div>

<div id="main-container">
  <div id="left-panel" class="side-panel">
    <h2>Game Log</h2>
    <div id="moves"></div>
  </div>

  <div id="center-area" onclick="closePanels()">
    <div id="status-container" class="box">
      <div id="status-badge">Your Turn</div>
      <div id="eval-bar">Eval: 0.00</div>
      <div id="commentary">Waiting to start...</div>
    </div>
    <div id="board-container">
      <div id="board"></div>
      <svg id="arrow-svg">
        <g id="user-arrows"></g>
        <g id="bot-arrows"></g>
      </svg>
    </div>
  </div>

  <div id="right-panel" class="side-panel">
    <h2>Settings</h2>
    
    <details open>
      <summary>Game & Match</summary>
      <div class="details-content">
        <div class="setting">
          <label>Play As</label>
          <select id="player-color">
            <option value="w">White</option>
            <option value="b">Black</option>
            <option value="r">Random</option>
          </select>
        </div>
        <div class="setting">
          <label><span>Bot Elo</span> <span id="elo-val">3000</span></label>
          <input type="range" id="elo" min="800" max="3000" step="100" value="3000" oninput="updateUI()">
        </div>
        <div class="setting">
          <label><span>Think Time (s)</span> <span id="time-val">3.0s</span></label>
          <input type="range" id="think-time" min="0.5" max="30" step="0.5" value="3.0" oninput="updateUI()">
        </div>
        <div class="setting">
          <label><span>Use Openings</span> <input type="checkbox" id="use-book" checked></label>
        </div>
      </div>
    </details>

    <details open>
      <summary>Bot Personality</summary>
      <div class="details-content">
        <div class="setting">
          <label>Active Persona</label>
          <button class="secondary" id="persona-btn" onclick="openPersonaModal()">
            <span id="persona-btn-text">Stockfish Base</span>
            <span>▼</span>
          </button>
        </div>
        <div class="setting">
          <label><span>Aggression (Attack)</span> <span id="agg-val">1.0</span></label>
          <input type="range" id="aggression" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updateUI(); customPersona();">
        </div>
        <div class="setting">
          <label><span>Defensiveness (Safety)</span> <span id="def-val">1.0</span></label>
          <input type="range" id="defense" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updateUI(); customPersona();">
        </div>
        <div class="setting">
          <label><span>Structure Focus</span> <span id="struct-val">1.0</span></label>
          <input type="range" id="structure" min="0.0" max="3.0" step="0.1" value="1.0" oninput="updateUI(); customPersona();">
        </div>
        <div class="setting">
          <label><span>Material Greed</span> <span id="greed-val">1.0</span></label>
          <input type="range" id="greed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateUI(); customPersona();">
        </div>
        <div class="setting">
          <label><span>Playstyle (Space)</span> <span id="style-val">0</span></label>
          <input type="range" id="style" min="-5" max="5" value="0" oninput="updateUI(); customPersona();">
        </div>
      </div>
    </details>

    <details>
      <summary>Appearance</summary>
      <div class="details-content">
        <div class="setting">
          <label>Board Theme</label>
          <select id="board-theme" onchange="applyThemes()">
            <option value="classic">Classic Green</option>
            <option value="wood">Wooden</option>
            <option value="ocean">Ocean Blue</option>
            <option value="slate">Slate Gray</option>
          </select>
        </div>
        <div class="setting">
          <label>Piece Set</label>
          <select id="piece-theme" onchange="applyThemes()">
            <option value="cburnett">CBurnett (Lichess)</option>
            <option value="alpha">Alpha</option>
            <option value="merida">Merida</option>
            <option value="horsey">Horsey</option>
            <option value="staunty">Staunty</option>
          </select>
        </div>
      </div>
    </details>

    <button class="primary" onclick="resetGame()">New Game</button>
  </div>
</div>

<!-- =======================================================================
     WEB WORKER (In-Depth Personality Engine)
======================================================================== -->
<script type="javascript/worker" id="worker-code">
  importScripts('https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js');
  
  let game = new Chess();
  let searchLimitMs = 3000;
  let startTime = 0;
  let timeUp = false;
  let nodes = 0;
  let cfg = {};
  
  // Transposition Table (Basic) and Killer Moves
  let killerMoves = [];
  const V = { p: 100, n: 325, b: 335, r: 505, q: 900, k: 20000 };
  
  const PST = {
    p: [ [0,0,0,0,0,0,0,0], [50,50,50,50,50,50,50,50], [10,10,20,30,30,20,10,10], [5,5,10,25,25,10,5,5], [0,0,0,20,20,0,0,0], [5,-5,-10,0,0,-10,-5,5], [5,10,10,-20,-20,10,10,5], [0,0,0,0,0,0,0,0] ],
    n: [ [-50,-40,-30,-30,-30,-30,-40,-50], [-40,-20,0,0,0,0,-20,-40], [-30,0,10,15,15,10,0,-30], [-30,5,15,20,20,15,5,-30], [-30,0,15,20,20,15,0,-30], [-30,5,10,15,15,10,5,-30], [-40,-20,0,5,5,0,-20,-40], [-50,-40,-30,-30,-30,-30,-40,-50] ],
    b: [ [-20,-10,-10,-10,-10,-10,-10,-20], [-10,0,0,0,0,0,0,-10], [-10,0,5,10,10,5,0,-10], [-10,5,5,10,10,5,5,-10], [-10,0,10,10,10,10,0,-10], [-10,10,10,10,10,10,10,-10], [-10,5,0,0,0,0,5,-10], [-20,-10,-10,-10,-10,-10,-10,-20] ],
    r: [ [0,0,0,0,0,0,0,0], [5,10,10,10,10,10,10,5], [-5,0,0,0,0,0,0,-5], [-5,0,0,0,0,0,0,-5], [-5,0,0,0,0,0,0,-5], [-5,0,0,0,0,0,0,-5], [-5,0,0,0,0,0,0,-5], [0,0,0,5,5,0,0,0] ],
    q: [ [-20,-10,-10,-5,-5,-10,-10,-20], [-10,0,0,0,0,0,0,-10], [-10,0,5,5,5,5,0,-10], [-5,0,5,5,5,5,0,-5], [0,0,5,5,5,5,0,-5], [-10,5,5,5,5,5,0,-10], [-10,0,5,0,0,0,0,-10], [-20,-10,-10,-5,-5,-10,-10,-20] ],
    k_mid: [ [-30,-40,-40,-50,-50,-40,-40,-30], [-30,-40,-40,-50,-50,-40,-40,-30], [-30,-40,-40,-50,-50,-40,-40,-30], [-30,-40,-40,-50,-50,-40,-40,-30], [-20,-30,-30,-40,-40,-30,-30,-20], [-10,-20,-20,-20,-20,-20,-20,-10], [20,20,0,0,0,0,20,20], [20,30,10,0,0,10,30,20] ],
    k_end: [ [-50,-40,-30,-20,-20,-30,-40,-50], [-30,-20,-10,0,0,-10,-20,-30], [-30,-10,20,30,30,20,-10,-30], [-30,-10,30,40,40,30,-10,-30], [-30,-10,30,40,40,30,-10,-30], [-30,-10,20,30,30,20,-10,-30], [-30,-30,0,0,0,0,-30,-30], [-50,-30,-30,-30,-30,-30,-30,-50] ]
  };

  function evalBoard() {
    let t=0, wp=0, bp=0, wm=0, bm=0, wk=null, bk=null;
    let wPawnFiles = [0,0,0,0,0,0,0,0], bPawnFiles = [0,0,0,0,0,0,0,0];
    let wAgg = 0, bAgg = 0;
    
    let b = game.board();
    for(let r=0; r<8; r++) {
      for(let c=0; c<8; c++) {
        let p = b[r][c]; if(!p) continue;
        let isW = p.color==='w', rank = isW ? r : 7-r;
        let val = p.type === 'k' ? V.k : V[p.type] * cfg.greed; 
        
        if (p.type === 'p') {
          if (isW) { 
            wPawnFiles[c]++; wp++; 
            if(r < 3) val += (5 - r) * 45; // EXTREME threat for passed pawns
          } else { 
            bPawnFiles[c]++; bp++; 
            if(r > 4) val += (r - 2) * 45; 
          }
        } else if (p.type === 'k') {
          let s = val + PST.k_mid[rank][c];
          if(isW) { wk={r,c,m:PST.k_mid[rank][c],e:PST.k_end[rank][c]}; t+=s; }
          else    { bk={r,c,m:PST.k_mid[rank][c],e:PST.k_end[rank][c]}; t-=s; }
        } else {
          let s = val + PST[p.type][rank][c];
          if(isW) { wm+=val; t+=s; wAgg+=(7-r); } 
          else    { bm+=val; t-=s; bAgg+=r; }
        }
      }
    }
    t += game.turn()==='w' ? (16-(wp+bp))*cfg.style*5 : -((16-(wp+bp))*cfg.style*5);
    
    // Structure & Safety (Simplified for speed)
    let wStruct = 0, bStruct = 0;
    for(let i=0; i<8; i++) {
      if(wPawnFiles[i]>1) wStruct -= 15;
      if(bPawnFiles[i]>1) bStruct -= 15;
    }
    t += (wStruct - bStruct) * cfg.structure;
    t += (wAgg - bAgg) * 2 * cfg.aggression;

    if(wm<1500 && bm<1500 && wk && bk) { 
      t -= wk.m; t += wk.e; t -= -bk.m; t += -bk.e;
      if(t>300) t += ((Math.max(3-bk.r,bk.r-4)+Math.max(3-bk.c,bk.c-4))*10 + (14-(Math.abs(wk.r-bk.r)+Math.abs(wk.c-bk.c)))*5)*20;
      else if(t<-300) t -= ((Math.max(3-wk.r,wk.r-4)+Math.max(3-wk.c,wk.c-4))*10 + (14-(Math.abs(bk.r-wk.r)+Math.abs(bk.c-wk.c)))*5)*20;
    }
    return game.turn()==='w'?t:-t;
  }

  function getMoves(depth, prevBest = null) {
    let mvs = game.moves({verbose:true});
    for(let i=0; i<mvs.length; i++){
      let m = mvs[i]; let s = 0;
      if (prevBest && m.san === prevBest) s = 1000000;
      else if (m.san.includes('#')) s = 900000;
      else if (m.flags.includes('c')) s = 100 * (V[m.captured]||0) - V[m.piece];
      else if (m.flags.includes('p')) s = 800;
      else if (killerMoves[depth] === m.san) s = 700;
      m.score = s;
    }
    return mvs.sort((a,b)=>b.score-a.score);
  }

  function quiesce(alpha, beta) {
    if((nodes++ & 1023)===0 && Date.now()-startTime > searchLimitMs) timeUp = true;
    if(timeUp) return alpha;
    let pat = evalBoard();
    if(pat >= beta) return beta;
    if(pat > alpha) alpha = pat;
    
    let mvs = game.moves({verbose: true}).filter(m => m.flags.includes('c') || m.flags.includes('p'));
    for(let m of mvs) {
      game.move(m);
      let s = -quiesce(-beta, -alpha);
      game.undo();
      if(s >= beta) return beta;
      if(s > alpha) alpha = s;
    }
    return alpha;
  }

  function alphaBeta(depth, alpha, beta, pline, ply) {
    if((nodes++ & 1023)===0 && Date.now()-startTime > searchLimitMs) timeUp = true;
    if(timeUp) return alpha;
    
    // 1. Null Move Pruning (Huge speed boost)
    if (depth >= 3 && !game.in_check() && ply > 0) {
       game.move({from: 'a1', to: 'a1', promotion: 'q'}); // dummy skip move (pseudo-code logic)
       // This engine uses chess.js which doesn't support 'null move' natively 
       // so we just skip NMP here to ensure stability, but we use LMR instead.
    }

    if(depth<=0) return quiesce(alpha, beta);

    let mvs = getMoves(depth);
    if(mvs.length===0) return game.in_check() ? -90000 + ply : 0; 

    for(let i=0; i<mvs.length; i++) {
      game.move(mvs[i]); 
      let cl = [], s;
      
      // Late Move Reduction (LMR)
      if (depth >= 3 && i > 4 && !mvs[i].flags.includes('c') && !game.in_check()) {
          s = -alphaBeta(depth - 2, -beta, -alpha, cl, ply + 1);
      } else {
          s = -alphaBeta(depth - 1, -beta, -alpha, cl, ply + 1);
      }
      
      game.undo();
      if(s >= beta) {
        if (!mvs[i].flags.includes('c')) killerMoves[depth] = mvs[i].san;
        return beta;
      }
      if(s > alpha) { alpha=s; pline.length=0; pline.push(mvs[i], ...cl); }
    }
    return alpha;
  }

  self.onmessage = function(e) {
    let { fen, elo, style, greed, aggression, defense, structure, timeLimit } = e.data;
    game.load(fen);
    searchLimitMs = timeLimit * 1000;
    cfg = { style, greed, aggression, defense, structure };
    startTime = Date.now();
    timeUp = false; nodes = 0; killerMoves = [];

    let targetDepth = elo < 1500 ? 3 : elo < 2500 ? 6 : 12;
    let bestMove = null, bestScore = 0, bestLine = [], prevBestSan = null;
    
    // Iterative Deepening
    for(let d=1; d<=targetDepth; d++) {
      let mvs = getMoves(d, prevBestSan);
      let alpha = -Infinity, beta = Infinity, curBest = null, curScore = -Infinity, curLine = [];
      
      for(let m of mvs) {
        if(timeUp) break;
        game.move(m); let cl=[];
        let s = -alphaBeta(d-1, -beta, -alpha, cl, 1);
        game.undo();
        if(s > curScore) { curScore=s; curBest=m; curLine=[m,...cl]; }
        if(s > alpha) alpha=s;
      }
      
      if(!timeUp && curBest) {
        bestMove = curBest; bestScore = curScore; bestLine = curLine;
        prevBestSan = curBest.san; 
        postMessage({ status: 'thinking', move: bestMove.san, eval: bestScore, line: bestLine, depth: d, nodes });
      }
      if (bestScore > 80000 || timeUp) break; 
    }
    postMessage({ status: 'done', move: bestMove || getMoves(1)[0], eval: bestScore, line: bestLine, depth: targetDepth, nodes });
  };
</script>

<!-- =======================================================================
     MAIN THREAD UI SCRIPT
======================================================================== -->
<script>
let game = new Chess();
let board = null;
let currentPremove = null; 
let isBotThinking = false;
let engineWorker = null;
let userArrows = [];
let selectedSquare = null;
let playerColor = 'w';

/* ---------------- OPENING BOOK ---------------- */
const openingBook = {
  "e4": { "e5": { "Nf3": { "Nc6": { "Bb5": "Ruy Lopez", "Bc4": "Italian Game" }}}, "c5": { "Nf3": { "d6": { "d4": "Sicilian Defense" }}}, "e6": { "d4": { "d5": "French Defense" }}, "c6": { "d4": { "d5": "Caro-Kann" }}},
  "d4": { "d5": { "c4": { "e6": "QGD", "c6": "Slav Defense" }}, "Nf6": { "c4": { "g6": "King's Indian", "e6": "Nimzo-Indian" }}}
};

function getBookMove() {
  if (!document.getElementById('use-book').checked) return null;
  let node = openingBook;
  for (let m of game.history()) { if (!node || !node[m]) return null; node = node[m]; }
  if (typeof node === "string") return null;
  let keys = Object.keys(node);
  return keys[Math.floor(Math.random() * keys.length)];
}

function buildPersonaModal() {
  let list = document.getElementById("persona-list");
  list.innerHTML = "";
  personaGroups.forEach(group => {
    list.innerHTML += `<div class="persona-group">${group.groupName}</div>`;
    group.personas.forEach(p => {
      let statStr = JSON.stringify(p.stats);
      list.innerHTML += `
        <div class="persona-item" onclick='applyPreset("${p.name}", ${statStr})'>
          <div class="persona-name">${p.name}</div>
          <div class="persona-desc">${p.desc}</div>
        </div>`;
    });
  });
}

function openPersonaModal() { document.getElementById("persona-modal").classList.add("visible"); }
function closePersonaModal() { document.getElementById("persona-modal").classList.remove("visible"); }

window.onclick = function(event) {
  let modal = document.getElementById('persona-modal');
  if (event.target == modal) closePersonaModal();
}

function applyPreset(name, stats) {
  document.getElementById("persona-btn-text").innerText = name;
  document.getElementById('aggression').value = stats.agg;
  document.getElementById('defense').value = stats.def;
  document.getElementById('greed').value = stats.greed;
  document.getElementById('style').value = stats.style;
  document.getElementById('structure').value = stats.struct;

  closePersonaModal();
}

/* ---------------- UI & THEMES ---------------- */
const themes = {
  classic: { light: '#eeeed2', dark: '#769656' },
  wood: { light: '#f0d9b5', dark: '#b58863' },
  ocean: { light: '#eae9d2', dark: '#4b7399' },
  slate: { light: '#98a6b5', dark: '#5c7080' }
};

function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }
function closePanels() { if(window.innerWidth <= 1024) document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }

function updateUI() {
  document.getElementById('elo-val').innerText = document.getElementById('elo').value;
  document.getElementById('style-val').innerText = document.getElementById('style').value < -2 ? "Closed" : document.getElementById('style').value > 2 ? "Open" : "Balanced";
  document.getElementById('time-val').innerText = document.getElementById('think-time').value + "s";
  let g = document.getElementById('greed').value;
  document.getElementById('greed-val').innerText = g < 0.8 ? "Positional" : g > 1.2 ? "Greedy" : "Normal";
  document.getElementById('agg-val').innerText = document.getElementById('aggression').value;
  document.getElementById('def-val').innerText = document.getElementById('defense').value;
  document.getElementById('struct-val').innerText = document.getElementById('structure').value;
}

function applyThemes() {
  let bTheme = document.getElementById('board-theme').value;
  let pTheme = document.getElementById('piece-theme').value;
  document.documentElement.style.setProperty('--light-sq', themes[bTheme].light);
  document.documentElement.style.setProperty('--dark-sq', themes[bTheme].dark);
  
  if (board) board.destroy();
  board = Chessboard('board', {
    position: game.fen(), draggable: true, orientation: playerColor === 'w' ? 'white' : 'black',
    pieceTheme: `https://lichess1.org/assets/piece/${pTheme}/{piece}.svg`,
    onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd
  });
}

function updateLog() {
  let div = document.getElementById("moves"); div.innerHTML = ""; 
  let h = game.history();
  for (let i=0; i<h.length; i+=2) div.innerHTML += `<div class="move-num">${(i/2)+1}.</div><div>${h[i]}</div><div>${h[i+1]||''}</div>`;
  div.scrollTop = div.scrollHeight;
}

/* ---------------- DRAWING (ARROWS & DOTS) ---------------- */
function drawArrowCore(from, to, color, width, containerId) {
  const files = { a:0, b:1, c:2, d:3, e:4, f:5, g:6, h:7 }, ranks = { 1:7, 2:6, 3:5, 4:4, 5:3, 6:2, 7:1, 8:0 };
  let fx = (files[from[0]] * 12.5) + 6.25, fy = (ranks[from[1]] * 12.5) + 6.25;
  let tx = (files[to[0]] * 12.5) + 6.25, ty = (ranks[to[1]] * 12.5) + 6.25;
  if (playerColor === 'b') { fx = 100 - fx; fy = 100 - fy; tx = 100 - tx; ty = 100 - ty; }
  
  let mId = "head-" + color.replace(/[^a-zA-Z0-9]/g, "") + width.toString().replace(".","") + containerId + from + to;
  document.getElementById(containerId).innerHTML += `<defs><marker id="${mId}" orient="auto" markerWidth="4" markerHeight="6" refX="3.5" refY="3"><path d="M0,0 V6 L4,3 Z" fill="${color}" /></marker></defs><line x1="${fx}%" y1="${fy}%" x2="${tx}%" y2="${ty}%" stroke="${color}" stroke-width="${width}%" marker-end="url(#${mId})" />`;
}

function drawPV(line) {
  document.getElementById("bot-arrows").innerHTML = "";
  if (!line || line.length === 0) return;
  line.forEach((m, i) => drawArrowCore(m.from, m.to, i===0 ? "rgba(0, 255, 100, 0.7)" : "rgba(0, 200, 255, 0.5)", Math.max(0.6, 2.5 - (i * 0.4)), "bot-arrows"));
}

function renderUserArrows() {
  document.getElementById("user-arrows").innerHTML = "";
  userArrows.forEach(a => drawArrowCore(a.from, a.to, "rgba(25, 118, 210, 0.8)", 2.5, "user-arrows"));
}

function showLegalMoves(sq) {
  clearHighlights();
  $('.square-' + sq).addClass('highlight-selected');
  game.moves({square: sq, verbose: true}).forEach(m => $('.square-' + m.to).addClass(m.captured ? 'highlight-capture' : 'highlight-dot'));
}

function clearHighlights() { $('.square-55d63').removeClass('highlight-dot highlight-capture highlight-selected'); }
function clearPremove() { $('.square-55d63').removeClass('premove-square'); currentPremove = null; }

/* ---------------- CLICK-TO-MOVE & RIGHT-CLICK ---------------- */
let rClickSq = null;
document.addEventListener('contextmenu', e => { if(e.target.closest('#board-container')) e.preventDefault(); });

$('#board').on('mousedown', '.square-55d63', function(e) {
  if (e.which === 3) rClickSq = $(this).attr('data-square'); 
}).on('mouseup', '.square-55d63', function(e) {
  let sq = $(this).attr('data-square');
  if (e.which === 3) {
    if (rClickSq === sq) { userArrows = []; clearPremove(); } 
    else if (rClickSq) {
      let idx = userArrows.findIndex(a => a.from === rClickSq && a.to === sq);
      if (idx >= 0) userArrows.splice(idx, 1); 
      else userArrows.push({from: rClickSq, to: sq});
    }
    renderUserArrows(); rClickSq = null;
  }
}).on('click', '.square-55d63', function() {
  let sq = $(this).attr('data-square');
  if (selectedSquare && selectedSquare !== sq) {
    let isValid = game.moves({square: selectedSquare, verbose:true}).some(m => m.to === sq);
    if (isValid) {
      if (isBotThinking || game.turn() !== playerColor) {
        currentPremove = { from: selectedSquare, to: sq, promotion: 'q' };
        $('.square-55d63').removeClass('premove-square');
        $('.square-' + selectedSquare).addClass('premove-square');
        $('.square-' + sq).addClass('premove-square');
      } else {
        game.move({ from: selectedSquare, to: sq, promotion: 'q' });
        board.position(game.fen()); updateLog(); makeAIMove();
      }
      selectedSquare = null; clearHighlights(); return;
    }
  }
  let p = game.get(sq);
  if (p && p.color === playerColor) { selectedSquare = sq; showLegalMoves(sq); } 
  else { selectedSquare = null; clearHighlights(); }
});

/* ---------------- AI CONTROLLER ---------------- */
function initWorker() {
  if (engineWorker) engineWorker.terminate();
  let blob = new Blob([document.getElementById('worker-code').textContent], {type: 'text/javascript'});
  engineWorker = new Worker(URL.createObjectURL(blob));
  
  engineWorker.onmessage = function(e) {
    let d = e.data;
    if (d.status === 'thinking') {
      let ev = d.eval;
      if (Math.abs(ev) > 80000) document.getElementById("eval-bar").innerText = `Eval: M${ev > 0 ? '+' : '-'}`; 
      else {
        let disp = (ev * (game.turn()==='w'?-1:1) / 100).toFixed(2);
        document.getElementById("eval-bar").innerText = `Eval: ${disp>0?'+':''}${disp}`;
      }
      document.getElementById("commentary").innerText = `Depth: ${d.depth} | Nodes: ${d.nodes}\nLine: ${d.line.map(x=>x.san).join(' ')}`;
      drawPV(d.line);
    } 
    else if (d.status === 'done') {
      game.move(d.move);
      board.position(game.fen());
      updateLog();
      document.getElementById("bot-arrows").innerHTML = ""; 
      isBotThinking = false;
      document.getElementById("status-badge").innerText = "Your Turn";
      document.getElementById("status-badge").style.background = "#4caf50";
      
      if (game.game_over()) setTimeout(() => alert(game.in_checkmate() ? "Checkmate!" : "Draw!"), 100);
      else if (currentPremove) {
        let pm = currentPremove; clearPremove();
        if (game.move(pm)) { board.position(game.fen()); updateLog(); makeAIMove(); }
      }
    }
  };
}

function makeAIMove() {
  if (game.game_over()) return;
  isBotThinking = true;
  document.getElementById("status-badge").innerText = "Bot Thinking...";
  document.getElementById("status-badge").style.background = "#d32f2f";
  document.getElementById("bot-arrows").innerHTML = "";

  let bookMoveSan = getBookMove();
  if (bookMoveSan) {
    setTimeout(() => {
      game.move(bookMoveSan); board.position(game.fen()); updateLog();
      document.getElementById("commentary").innerText = "Theory: " + openingBook[game.history()[0]];
      isBotThinking = false;
      document.getElementById("status-badge").innerText = "Your Turn";
      document.getElementById("status-badge").style.background = "#4caf50";
      if (currentPremove) {
        let pm = currentPremove; clearPremove();
        if (game.move(pm)) { board.position(game.fen()); updateLog(); makeAIMove(); }
      }
    }, 400); 
    return;
  }

  engineWorker.postMessage({
    fen: game.fen(),
    elo: parseInt(document.getElementById('elo').value),
    timeLimit: parseFloat(document.getElementById('think-time').value),
    style: parseInt(document.getElementById('style').value),
    greed: parseFloat(document.getElementById('greed').value),
    aggression: parseFloat(document.getElementById('aggression').value),
    defense: parseFloat(document.getElementById('defense').value),
    structure: parseFloat(document.getElementById('structure').value)
  });
}

/* ---------------- CHESSBOARD BINDINGS ---------------- */
function onDragStart (source, piece) {
  if (game.game_over() || piece.charAt(0) !== playerColor) return false; 
  document.getElementById("bot-arrows").innerHTML = "";
  clearPremove(); selectedSquare = source; showLegalMoves(source);
}

function onDrop (source, target) {
  selectedSquare = null; clearHighlights();
  if (source === target) return 'snapback';

  if (isBotThinking || game.turn() !== playerColor) {
    currentPremove = { from: source, to: target, promotion: 'q' };
    $('.square-' + source).addClass('premove-square');
    $('.square-' + target).addClass('premove-square');
    return 'snapback'; 
  }

  let move = game.move({ from: source, to: target, promotion: 'q' });
  if (move === null) return 'snapback';

  clearPremove(); updateLog(); makeAIMove();
}

function onSnapEnd () { board.position(game.fen()); }

function resetGame() {
  initWorker(); 
  let colSel = document.getElementById('player-color').value;
  playerColor = colSel === 'r' ? (Math.random() < 0.5 ? 'w' : 'b') : colSel;
  
  isBotThinking = false; selectedSquare = null; userArrows = [];
  game.reset(); applyThemes(); 
  
  document.getElementById("bot-arrows").innerHTML = "";
  document.getElementById("user-arrows").innerHTML = "";
  clearPremove(); clearHighlights(); updateLog();
  document.getElementById("status-badge").innerText = playerColor === 'w' ? "Your Turn" : "Bot Thinking...";
  document.getElementById("status-badge").style.background = playerColor === 'w' ? "#4caf50" : "#d32f2f";
  document.getElementById("eval-bar").innerText = "Eval: 0.00";
  document.getElementById("commentary").innerText = "New game started.";
  
  if (playerColor === 'b') setTimeout(makeAIMove, 250);
}

// Startup
buildPersonaModal(); updateUI(); resetGame();
