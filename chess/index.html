<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://thepollitosd.github.io/chess/coi-serviceworker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        :root {
            --bg: #1e1e24;
            --panel: #2b2b36;
            --text: #e0e0e0;
            --accent: #4caf50;
            --light-sq: #eeeed2;
            --dark-sq: #769656;
        }

        html {
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: #1a1a20;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        #header h1 {
            margin: 0;
            font-size: 1.2em;
            font-weight: 600;
        }

        .menu-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        .side-panel {
            width: 320px;
            background: var(--panel);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            z-index: 10;
        }

        #center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
            padding: 20px 10px;
        }

        #status-container {
            width: 100%;
            max-width: 520px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        #board-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            position: relative;
            width: 100%;
            max-width: 520px;
            touch-action: none;
            margin: 0 auto;
            gap: 15px;
        }

        #eval-gauge {
            flex-shrink: 0;
            width: 24px;
            min-width: 24px;
            background: #222;
            border-radius: 4px;
            border: 1px solid #444;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            position: relative;
        }

        #eval-fill {
            width: 100%;
            background: #fff;
            height: 50%;
            transition: height 0.3s ease, background 0.3s ease;
        }

        #eval-text {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: #888;
            font-size: 0.75em;
            font-weight: bold;
            mix-blend-mode: difference;
            pointer-events: none;
        }

        #board-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
        }

        #board {
            width: 100%;
        }

        #arrow-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: visible;
        }

        .white-1e1d7 {
            background-color: var(--light-sq) !important;
            color: var(--dark-sq) !important;
        }

        .black-3c85d {
            background-color: var(--dark-sq) !important;
            color: var(--light-sq) !important;
        }

        .premove-square {
            box-shadow: inset 0 0 0 50px rgba(220, 50, 50, 0.6) !important;
        }

        .highlight-selected {
            background-color: rgba(200, 200, 50, 0.5) !important;
        }

        .highlight-dot::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 25%;
            height: 25%;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        .highlight-capture::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 6px solid rgba(0, 0, 0, 0.25);
            box-sizing: border-box;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
        }

        h2,
        h3 {
            margin: 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
            font-weight: 500;
        }

        .box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        details {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            margin-bottom: 5px;
        }

        summary {
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            user-select: none;
        }

        summary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .details-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #444;
        }

        .setting {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting label {
            font-size: 0.85em;
            color: #bbb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="range"] {
            accent-color: var(--accent);
            height: 15px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            transform: scale(1.3);
            accent-color: var(--accent);
            cursor: pointer;
        }

        select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 0;
        }

        button.primary:hover {
            filter: brightness(1.2);
        }

        #moves {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-family: monospace;
            font-size: 1.1em;
            max-height: 100%;
            overflow-y: auto;
        }

        .move-num {
            color: #888;
            text-align: right;
            padding-right: 10px;
        }

        #commentary {
            font-style: italic;
            color: #aaa;
            margin-top: 10px;
            font-size: 0.95em;
            line-height: 1.4;
            min-height: 40px;
            word-wrap: break-word;
        }

        #status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            background: #555;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #eval-bar {
            font-size: 1.1em;
            font-weight: bold;
        }

        #hw-info {
            font-size: 0.78em;
            color: #888;
            margin-top: 4px;
            letter-spacing: 0.03em;
        }

        #hw-info span {
            color: #4caf50;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            #left-panel {
                position: absolute;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 20;
                transition: transform 0.3s ease;
            }

            #right-panel {
                position: absolute;
                right: 0;
                height: 100%;
                transform: translateX(100%);
                z-index: 20;
                transition: transform 0.3s ease;
            }

            .side-panel.open {
                transform: translateX(0) !important;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            }
        }

        @media (min-width: 1025px) {
            #header {
                display: none;
            }
        }

        .warning-text {
            font-size: 0.75em;
            color: #ff9800;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>

<body>
    <div id="header">
        <button class="menu-btn" onclick="togglePanel('left-panel')">☰ Log</button>
        <h1>V3.0.1</h1>
        <button class="menu-btn" onclick="togglePanel('right-panel')">⚙️ Set</button>
    </div>
    <div id="main-container">
        <div id="left-panel" class="side-panel">
            <h2>Game Log</h2>
            <div id="moves"></div>
        </div>

            <div id="status-container" class="box">
                <div id="status-badge" style="display:inline-block; margin-bottom:5px;">Your Turn</div>

                    style="display:inline-block; float:right; font-size:1.0em; font-weight:bold; color:#00e5ff;">
                    Material: =</div>

                <div id="hw-info">Engine: initializing...</div>

                <div id="threat-area" style="color: #f44336; font-weight: bold; font-size: 0.85em; margin-top: 5px;">
                </div>
            </div>
            <div id="board-container">
                <div id="eval-gauge">
                    <div id="eval-fill"></div>
                    <div id="eval-text">0.0</div>
                </div>
                <div id="board-wrapper">
                    <div id="board"></div>
                    <svg id="arrow-svg" xmlns="http://www.w3.org/2000/svg">
                        <g id="user-arrows"></g>
                        <g id="bot-arrows"></g>

                <div id="mini-board"
                    style="width: 250px; margin: 0 auto; border: 2px solid #555; pointer-events: none;"></div>
            </div>
        </div>
        <div id="right-panel" class="side-panel">
            <h2>Settings</h2>
            <button class="primary" onclick="resetGame()">New Game</button>
            <details open>
                <summary>Match Parameters</summary>
                <div class="details-content">
                    <div class="setting">
                        <label>Play Mode</label>
                        <select id="play-mode">
                            <option value="human">You vs Pro AI</option>
                            <option value="stockfish">Pro AI vs Stockfish 16 (API)</option>
                            <option value="ai-self">Pro AI vs Pro AI</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>Play As</label>
                        <select id="player-color">
                            <option value="w">White</option>
                            <option value="b">Black</option>
                            <option value="r">Random</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label><span>Think Time (s)</span> <span id="time-val">3.0s</span></label>
                        <input type="range" id="think-time" min="0.5" max="60" step="0.5" value="3.0"
                            oninput="updateUI()">
                    </div>
                    <div class="setting">
                        <label><span>Workers (Threads)</span> <span id="threads-val">Auto</span></label>
                        <input type="range" id="threads" min="1" max="16" step="1" value="4" oninput="updateUI()">
                        <div class="warning-text">Tip: set the slider to the Auto value to enable Auto mode.</div>
                    </div>
                    <div class="setting">
                        <label><span>Opening Book</span> <input type="checkbox" id="use-book" checked></label>
                    </div>
                    <div class="setting">
                        <label><span>Show Arrows</span> <input type="checkbox" id="show-arrows" checked></label>
                    </div>
                    <div class="setting">
                        <label><span>Syzygy Tablebases</span> <input type="checkbox" id="use-tb" checked></label>
                    </div>
                    <div class="setting">
                        <label><span>Enable Neural Network</span> <input type="checkbox" id="use-nn" disabled></label>
                        <div class="warning-text">⚠️ Neural evaluation is currently not stable</div>
                    </div>
                </div>
            </details>
            <details>
                <summary>Appearance</summary>
                <div class="details-content">
                    <div class="setting">
                        <label>Board Theme</label>
                        <select id="board-theme" onchange="applyThemes()">
                            <option value="classic">Classic Green</option>

            </details>
        </div>
    </div>

                        egBlack += eg_table[p * 64 + sq];

            let egScore = egWhite - egBlack;
            let mgPhase = gamePhase;
            if (mgPhase > 24) mgPhase = 24;
            let egPhase = 24 - mgPhase;

            }

            if(movesMade===0) return {score: inCheck ? -40000+ply : 0, move: null};

            saveTT(hash, alpha, depth, alpha<=origAlpha ? 1 : (alpha>=beta ? 2 : 0), bestMove);

            return {score: alpha, move: bestMove};
        }

        // TIER 2: Quiescence
        function quiesce(alpha, beta) {
            if((nodes++ & 1023)===0 && Date.now() - startTime > limitMs) timeUp = true;
            if(timeUp) return alpha;
            
            // Fast stand-pat unless close to the window.
            let stand_pat = evaluateFast();
            if (stand_pat > alpha - 150 && stand_pat < beta + 150) stand_pat = evaluate();
            if(stand_pat >= beta) return beta;
            if(stand_pat > alpha) alpha = stand_pat;

            let inCheck = isAttacked(ctz(bb[turn?5:11]), turn, (wOcc() | bOcc()));
            let moves;
            if (inCheck) {
                moves = genMoves(false); // All moves if in check
                moves.forEach(m => { m.s = scoreMove(m, null, 0, null); });
                moves.sort((a,b) => b.s - a.s);
            } else {
                moves = genMoves(true); // Captures only
                moves.sort((a,b) => ((V[b.c%6]||0)*10 - (V[b.pce%6]||0)) - ((V[a.c%6]||0)*10 - (V[a.pce%6]||0)));
            }
            
            let gamePhase = computeGamePhase();
            for(let m of moves) {
                if (!inCheck && m.c !== -1 && see(m) < 0) continue; // Only prune bad captures if not in check
                // TIER 4: Delta Pruning
                if (!inCheck && m.prom === -1 && stand_pat + (V[m.c%6] || 0) + 200 < alpha && gamePhase > 10) {
                    continue; 
                }

                makeMove(m);
                if(isAttacked(ctz(bb[turn?5:11]), turn, (wOcc() | bOcc()))) { unmakeMove(m); continue; }
                let s = -quiesce(-beta, -alpha);
                unmakeMove(m);
                if(timeUp) return alpha;
                if(s >= beta) return beta;
                if(s > alpha) alpha = s;
            }
            return alpha;
        }

        initPrecomputes();

        self.onmessage = function(e) {
            let msg = e.data;
            if (msg.cmd === 'init') {
                TT_BUFFER = msg.ttBuffer;
                TT_VIEW = new Int32Array(TT_BUFFER);
            } else if (msg.cmd === 'stop') {
                if (msg.token === undefined || msg.token === self.searchToken) {
                    timeUp = true;
                    limitMs = 0;
                    softLimitMs = 0;
                }
            } else if (msg.cmd === 'search') {
                setFen(msg.fen);
                self.searchToken = msg.token;
                let t = Number(msg.time);
                if (!Number.isFinite(t) || t <= 0) t = 1.5;
                softLimitMs = t * 1000;
                limitMs = Math.max(softLimitMs * 1.5, softLimitMs + 1000);
                useNN = msg.useNN !== false;
                self.workerId = msg.id; 
                let rootMoves = genMoves(false, false);
                // Shard BEFORE scoring/sorting to avoid N-times root sorting across workers.
                if (msg.totalWorkers > 1 && rootMoves.length > 1) {
                    let shard = rootMoves.filter((_, idx) => idx % msg.totalWorkers === msg.id);
                    if (shard.length > 0) rootMoves = shard;
                }
                rootMoves.forEach(m => { m.s = scoreMove(m, null, 0, null); });
                rootMoves.sort((a, b) => b.s - a.s);
                let res = search(64, rootMoves, -50000, 50000);
                postMessage({status: 'done', move: fmt(res.move), score: res.score, nodes: res.nodes, id: msg.id, token: self.searchToken});
            }
        };
    </script>

    <!-- OVERARCHING SYSTEM -->
    <script>
        const game = new Chess();
        const TT_SIZE = 1 << 22;
        let board = null;
        let miniBoard = null;
        let workers = [];
        let numThreads = 4;
        let isThinking = false;
        let staticHumanSide = 'w';
        let smoothedEval = 0;
        let hasSmoothedEval = false;

        function isIpadLike() {
            try {
                // iPadOS 13+ reports as MacIntel but has touch points.
                return /iPad/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            } catch (e) { return false; }
        }

        function autoThreadCount() {
            let hc = 4;
            try { hc = Number(navigator.hardwareConcurrency) || 4; } catch (e) { hc = 4; }

            // Conservative caps to avoid thermal throttling + UI jank on mobile/iPad.
            let cap = isIpadLike() ? 4 : 12;
            let base = Math.max(1, Math.min(cap, hc));

            // Leave one core for UI on desktop-ish devices when possible.
            if (!isIpadLike() && base >= 6) base = Math.max(1, base - 1);
            return Math.max(1, Math.min(16, base));
        }

        function updateUI() {
            document.getElementById('time-val').innerText = document.getElementById('think-time').value + "s";
            let threadsEl = document.getElementById('threads');
            let raw = Number(threadsEl.value);
            let auto = autoThreadCount();

            // Treat slider == auto as "Auto" mode (no extra toggle needed).
            let useAuto = !Number.isFinite(raw) || raw === auto;
            numThreads = useAuto ? auto : Math.max(1, Math.min(16, Math.floor(raw)));

            document.getElementById('threads-val').innerText = useAuto ? 'Auto' : String(numThreads);
        }

        function togglePanel(id) { document.getElementById(id).classList.toggle('open'); }
        function closePanels() { if (window.innerWidth <= 1024) document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open')); }

        let dotSquares = [];
        let premoves = [];

        function showLegalMoves(square, asPremove) {
            clearDots();
            let cgame = game;
            if (asPremove && document.getElementById('player-color').value !== 'r') {
                let tokens = game.fen().split(' ');
                tokens[1] = tokens[1] === 'w' ? 'b' : 'w';
                tokens[3] = '-'; // strip EP to prevent fen errors from bad swaps
                try {
                    let tempGame = new Chess();
                    if (tempGame.load(tokens.join(' '))) cgame = tempGame;
                } catch (e) { }
            }
            let moves = cgame.moves({ square: square, verbose: true });
            
            let selEl = document.querySelector('.square-' + square);
            if (selEl) {
                selEl.classList.add('highlight-selected');
                dotSquares.push({ el: selEl, cls: 'highlight-selected' });
            }

            if (moves.length === 0) return;
            for (let m of moves) {
                let sqEl = document.querySelector('.square-' + m.to);
                if (sqEl) {
                    let cls = m.captured ? 'highlight-capture' : 'highlight-dot';
                    sqEl.classList.add(cls);
                    dotSquares.push({ el: sqEl, cls: cls });
                }
            }
        }

        function clearDots() {
            dotSquares.forEach(item => { if (item.el) item.el.classList.remove(item.cls); });
            dotSquares = [];
        }

        function renderPremoves() {
            document.querySelectorAll('.premove-square').forEach(el => el.classList.remove('premove-square'));
            for (let m of premoves) {
                let sqEl = document.querySelector('.square-' + m.to);
                if (sqEl) sqEl.classList.add('premove-square');
            }
        }

        function drawArrow(move) {
            let svg = document.getElementById('bot-arrows');
            if (!svg) return;
            svg.innerHTML = '';
            let show = document.getElementById('show-arrows');
            if (!move || (show && !show.checked)) return;

            // Ensure the SVG coordinate system matches the current board pixel size.
            let boardPx = document.getElementById('board').clientWidth;
            let svgRoot = document.getElementById('arrow-svg');
            if (svgRoot) svgRoot.setAttribute('viewBox', `0 0 ${boardPx} ${boardPx}`);

            let boardOri = board.orientation() === 'white' ? 1 : -1;
            let fFile = move.charCodeAt(0) - 97, fRank = parseInt(move[1]) - 1;
            let tFile = move.charCodeAt(2) - 97, tRank = parseInt(move[3]) - 1;

            if (boardOri === -1) {
                fFile = 7 - fFile; fRank = 7 - fRank;
                tFile = 7 - tFile; tRank = 7 - tRank;
            }

            let sqSize = boardPx / 8;
            let fx = fFile * sqSize + sqSize / 2;
            let fy = (7 - fRank) * sqSize + sqSize / 2;
            let tx = tFile * sqSize + sqSize / 2;
            let ty = (7 - tRank) * sqSize + sqSize / 2;

            let dx = tx - fx, dy = ty - fy;
            let angle = Math.atan2(dy, dx);
            let len = Math.sqrt(dx * dx + dy * dy) - (sqSize * 0.35);

            let line = `<defs>
                           <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
                             <polygon points="0 0, 6 3, 0 6" fill="rgba(255, 128, 0, 0.8)"/>
                           </marker>
                        </defs>
                        <line x1="${fx}" y1="${fy}" x2="${fx + Math.cos(angle) * len}" y2="${fy + Math.sin(angle) * len}" stroke="rgba(255, 128, 0, 0.8)" stroke-width="${sqSize * 0.12}" marker-end="url(#arrowhead)" />`;
            svg.innerHTML = line;
        }

        function applyThemes() {
            let b = document.getElementById('board-theme').value;
            let c = {
                classic: { l: '#eeeed2', d: '#769656' },
                wood: { l: '#f0d9b5', d: '#b58863' },
                slate: { l: '#98a6b5', d: '#5c7080' }
            };
            document.documentElement.style.setProperty('--light-sq', c[b].l);
            document.documentElement.style.setProperty('--dark-sq', c[b].d);

            if (board) board.destroy();
            board = Chessboard('board', {
                position: game.fen(), draggable: true, pieceTheme: `https://thepollitosd.github.io/chess/pieces/${document.getElementById('piece-theme').value}/{piece}.svg`,
                onDragStart: (a, p) => {
                    if (viewingHistory) {
                        snapToPresent();
                        return false;
                    }
                    if (game.game_over()) return false;
                    let mode = document.getElementById('play-mode').value;
                    if (mode === 'ai-self') return false;
                    if (mode === 'human' && p[0] !== staticHumanSide) return false;
                    if (mode === 'stockfish' && p[0] !== staticHumanSide) return false;

                    showLegalMoves(a, isThinking);
                },
                onDrop: (s, t) => {
                    selectedSquare = null;
                    clearDots();
                    if (s === t) return 'snapback';
                    if (isThinking) {
                        premoves.push({ from: s, to: t, promotion: 'q' });
                        renderPremoves();
                        return 'snapback';
                    } else {
                        let m = game.move({ from: s, to: t, promotion: 'q' });
                        if (!m) return 'snapback';
                        premoves = [];
                        updateLog(); document.getElementById('bot-arrows').innerHTML = '';
                        triggerNextTurn();
                    }
                },
                onSnapEnd: () => {
                    if (!viewingHistory) board.position(game.fen());
                }
            });

            if (miniBoard) miniBoard.destroy();
            miniBoard = Chessboard('mini-board', {
                position: game.fen(), showNotation: false, pieceTheme: `https://lichess1.org/assets/piece/${document.getElementById('piece-theme').value}/{piece}.svg`
            });
            
            attachBoardEvents();
        }

        let selectedSquare = null;
        let rightClickStartSq = null;
        let userArrows = [];
        let userHighlights = [];
        let viewingHistory = false;

        function snapToPresent() {
            viewingHistory = false;
            board.position(game.fen(), false);
            let hv = game.history({verbose: true});
            if (hv.length > 0) highlightMove(hv[hv.length-1].from, hv[hv.length-1].to);
            else removeHighlights();
        }

        function handleSquareClick(sq) {
            if (viewingHistory) {
                snapToPresent();
                return;
            }
            if (game.game_over()) return;
            let mode = document.getElementById('play-mode').value;
            if (mode === 'ai-self') return;
            if (mode !== 'human' && mode !== 'stockfish') return;

            let isMyTurn = (game.turn() === staticHumanSide);
            if (!isMyTurn) {
                if (selectedSquare) {
                    if (selectedSquare !== sq) {
                        premoves.push({ from: selectedSquare, to: sq, promotion: 'q' });
                        renderPremoves();
                    }
                    selectedSquare = null;
                    clearDots();
                } else {
                    let p = game.get(sq);
                    if (p && p.color === staticHumanSide) {
                        selectedSquare = sq;
                        showLegalMoves(sq, true);
                    }
                }
                return;
            }

            if (selectedSquare) {
                if (selectedSquare === sq) {
                    selectedSquare = null;
                    clearDots();
                } else {
                    let m = game.move({ from: selectedSquare, to: sq, promotion: 'q' });
                    if (m) {
                        selectedSquare = null;
                        clearDots();
                        premoves = [];
                        board.position(game.fen());
                        updateLog(); 
                        document.getElementById('bot-arrows').innerHTML = '';
                        triggerNextTurn();
                    } else {
                        let p = game.get(sq);
                        if (p && p.color === staticHumanSide) {
                            selectedSquare = sq;
                            showLegalMoves(sq, false);
                        } else {
                            selectedSquare = null;
                            clearDots();
                        }
                    }
                }
            } else {
                let p = game.get(sq);
                if (p && p.color === staticHumanSide) {
                    selectedSquare = sq;
                    showLegalMoves(sq, false);
                }
            }
        }

        function attachBoardEvents() {
            $('#board').off('contextmenu').on('contextmenu', function(e) {
                e.preventDefault();
            });

            $('#board').off('mousedown').on('mousedown', '.square-55d63', function(e) {
                if (e.button === 2) {
                    rightClickStartSq = $(this).attr('data-square');
                } else if (e.button === 0) {
                    let sq = $(this).attr('data-square');
                    handleSquareClick(sq);
                }
            });

            $('#board').off('mouseup').on('mouseup', '.square-55d63', function(e) {
                if (e.button === 2 && rightClickStartSq) {
                    let rightClickEndSq = $(this).attr('data-square');
                    if (rightClickStartSq === rightClickEndSq) {
                        let idx = userHighlights.indexOf(rightClickStartSq);
                        if (idx >= 0) userHighlights.splice(idx, 1);
                        else userHighlights.push(rightClickStartSq);
                    } else {
                        let existing = userArrows.findIndex(a => a.f === rightClickStartSq && a.t === rightClickEndSq);
                        if (existing >= 0) userArrows.splice(existing, 1);
                        else userArrows.push({f: rightClickStartSq, t: rightClickEndSq});
                    }
                    renderUserDrawings();
                    rightClickStartSq = null;
                }
            });

            $('#board').on('mousedown', function(e) {
                if (e.button === 0) {
                    if (userArrows.length > 0 || userHighlights.length > 0) {
                        userArrows = [];
                        userHighlights = [];
                        renderUserDrawings();
                    }
                }
            });
        }

        function renderUserDrawings() {
            let svg = document.getElementById('user-arrows');
            if (!svg) return;
            svg.innerHTML = '';
            
            let boardPx = document.getElementById('board').clientWidth;
            let sqSize = boardPx / 8;
            let boardOri = board.orientation() === 'white' ? 1 : -1;

            function getCenter(sq) {
                let file = sq.charCodeAt(0) - 97;
                let rank = parseInt(sq[1]) - 1;
                if (boardOri === -1) { file = 7 - file; rank = 7 - rank; }
                return { x: file * sqSize + sqSize / 2, y: (7 - rank) * sqSize + sqSize / 2 };
            }

            let html = '';
            for (let sq of userHighlights) {
                let c = getCenter(sq);
                html += `<rect x="${c.x - sqSize/2}" y="${c.y - sqSize/2}" width="${sqSize}" height="${sqSize}" fill="rgba(235, 97, 80, 0.5)" />`;
            }

            html += `<defs>
                       <marker id="user-arrowhead" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
                         <polygon points="0 0, 6 3, 0 6" fill="rgba(235, 97, 80, 0.8)"/>
                       </marker>
                     </defs>`;

            for (let a of userArrows) {
                let fc = getCenter(a.f);
                let tc = getCenter(a.t);
                let dx = tc.x - fc.x, dy = tc.y - fc.y;
                let angle = Math.atan2(dy, dx);
                let len = Math.sqrt(dx * dx + dy * dy) - (sqSize * 0.35);
                html += `<line x1="${fc.x}" y1="${fc.y}" x2="${fc.x + Math.cos(angle)*len}" y2="${fc.y + Math.sin(angle)*len}" stroke="rgba(235, 97, 80, 0.8)" stroke-width="${sqSize * 0.12}" marker-end="url(#user-arrowhead)" />`;
            }
            svg.innerHTML = html;
        }

        function viewHistory(idx) {
            let temp = new Chess();
            let h = game.history();
            for(let i=0; i<=idx; i++) temp.move(h[i]);
            board.position(temp.fen(), false);
            viewingHistory = true;
            removeHighlights();
            if (idx >= 0) {
                let m = temp.history({verbose: true}).pop();
                if(m) highlightMove(m.from, m.to);
            }
        }

        function updateMaterial() {
            let f = game.fen().split(' ')[0];
            let vals = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'P': -1, 'N': -3, 'B': -3, 'R': -5, 'Q': -9, 'k': 0, 'K': 0 };
            let diff = 0;
            for (let c of f) if (vals[c]) diff += vals[c];
            let el = document.getElementById('material-tracker');
            if (diff === 0) el.innerText = "Material: =";
            else el.innerText = "Material: " + (diff > 0 ? "Black +" + diff : "White +" + (-diff));
        }

            document.querySelectorAll('.square-55d63').forEach(s => s.style.boxShadow = '');

            let el1 = document.querySelector('.square-' + s);

            let hl = 'inset 0 0 0 50px rgba(255, 255, 0, 0.4)';

            for (let i = 0; i < h.length; i += 2) {

            "d4 Nf6 c4 g6 Nc3 Bg7 e4 d6 Nf3 O-O Be2 e5 O-O Nc6 d5 Ne7", // Mar del Plata
            "d4 Nf6 c4 g6 Nc3 Bg7 e4 d6 f3 O-O Be3 e5 d5", // Saemisch
            "d4 Nf6 c4 g6 Nc3 Bg7 e4 d6 Nf3 O-O h3 e5 d5", // Makogonov
            // Nimzo / Bogo / Queen's Indian
            "d4 Nf6 c4 e6 Nc3 Bb4 e3 O-O Bd3 d5 Nf3 c5 O-O", // Rubinstein
            "d4 Nf6 c4 e6 Nc3 Bb4 Qc2 O-O a3 Bxc3+ Qxc3", // Classical
            "d4 Nf6 c4 e6 Nf3 b6 g3 Bb7 Bg2 Be7 O-O O-O Nc3", // QID
            "d4 Nf6 c4 e6 Nf3 b6 a3 Ba6 Qc2 Bb7 Nc3 c5", // QID Petrosian
            "d4 Nf6 c4 e6 Nf3 Bb4+ Bd2 Bxd2+ Qxd2", // Bogo
            // Gruenfeld / Benoni / Benko
            "d4 Nf6 c4 g6 Nc3 d5 cxd5 Nxd5 e4 Nxc3 bxc3 Bg7 Bc4", // Gruenfeld Exchange
            "d4 Nf6 c4 c5 d5 e6 Nc3 exd5 cxd5 d6 e4 g6 f4", // Modern Benoni
            "d4 Nf6 c4 c5 d5 b5 cxb5 a6 bxa6 g6 Nc3", // Benko Gambit
            // Dutch Defense
            "d4 f5 g3 Nf6 Bg2 g6 Nf3 Bg7 O-O O-O c4 d6 Nc3 c6", // Leningrad
            "d4 f5 c4 Nf6 g3 e6 Bg2 d5 Nf3 c6 O-O Bd6 b3", // Stonewall
            "d4 f5 c4 Nf6 Nc3 e6 Nf3 d5 Bg5 Be7", // Classical
            // Flank / English / Reti
            "c4 c5 Nc3 Nc6 g3 g6 Bg2 Bg7 Nf3 Nf6 O-O O-O d4", // English Symmetrical
            "c4 e5 Nc3 Nf6 Nf3 Nc6 g3 d5 cxd5 Nxd5 Bg2 Nb6 O-O Be7", // English Reversed Sicilian
            "Nf3 d5 c4 d4 g3 Nc6 Bg2 e5 d3 Bb4+", // Reti
            "Nf3 Nf6 g3 g6 Bg2 Bg7 O-O O-O d3 d6 Nbd2", // KIA
            "b3 e5 Bb2 Nc6 e3 d5 Nf3 Bd6 c4" // Larsen's Opening
        ];

        async function checkOpeningBook() {
            if (!document.getElementById('use-book').checked) return null;
            let hist = game.history();
            let validNextMoves = [];

            for (let op of OPENINGS) {
                let moves = op.split(" ");
                if (moves.length > hist.length) {
                    let matches = true;
                    for (let i = 0; i < hist.length; i++) {
                        if (moves[i] !== hist[i]) { matches = false; break; }
                    }
                    if (matches) validNextMoves.push(moves[hist.length]);
                }
            }

            if (validNextMoves.length > 0) {
                // Return a random valid continuation
                return validNextMoves[Math.floor(Math.random() * validNextMoves.length)];
            }
            return null;
        }

        async function checkSyzygy() {
            let pieces = game.fen().split(' ')[0].replace(/[^a-zA-Z]/g, '').length;
            if (pieces <= 5 && document.getElementById('use-tb').checked) {
                try {
                    let res = await fetch(`http://tablebase.lichess.ovh/standard?fen=${encodeURIComponent(game.fen())}`);
                    let data = await res.json();
                    if (data && data.moves && data.moves.length > 0) return data.moves[0].uci;
                } catch (e) { }
            }
            return null;
        }

        let bestGlobalScore = -Infinity;
        let bestGlobalMove = null;
        let finishedWorkers = 0;
        let activeSearchToken = 0;
        let multiPV = [];

        function triggerNextTurn() {
            if (game.game_over()) {
                document.getElementById('status-badge').innerText = 'Game Over';
                document.getElementById('status-badge').style.background = '#111';
                setTimeout(() => alert('Game Over!'), 200);
                return;
            }

            let mode = document.getElementById('play-mode').value;
            let aiSide = staticHumanSide === 'w' ? 'b' : 'w';

            if (mode === 'human') {
                if (game.turn() === aiSide) makeAiMove();
                else processPremoves();
            } else if (mode === 'stockfish') {
                if (game.turn() === aiSide) makeAiMove();
                else playStockfishMove();
            } else if (mode === 'ai-self') {
                setTimeout(makeAiMove, 300);
            }
        }

        async function playStockfishMove() {
            if (game.game_over()) return;
            isThinking = true;
            document.getElementById('status-badge').innerText = 'Stockfish 16 Thinking...';
            document.getElementById('status-badge').style.background = '#0a5c88';
            document.getElementById('bot-arrows').innerHTML = '';

            try {
                let res = await fetch(`https://stockfish.online/api/s/v2.php?fen=${encodeURIComponent(game.fen())}&depth=13`);
                if (res.ok) {
                    let data = await res.json();
                    if (data && data.success && data.bestmove) {
                        let parts = data.bestmove.split(' ');
                        let m = parts.length > 1 ? parts[1] : parts[0];
                        game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
                        board.position(game.fen());
                        updateLog();
                        isThinking = false;
                        triggerNextTurn();
                        return;
                    }
                }
            } catch (e) { console.error('Stockfish API fail:', e); }

            document.getElementById('commentary').innerText = "Stockfish Connect Failed. Playing fallback.";
            isThinking = false;
            makeAiMove();
        }

        async function makeAiMove() {
            if (game.game_over()) return;
            isThinking = true;
            document.getElementById('bot-arrows').innerHTML = '';
            document.getElementById('status-badge').innerText = 'AI Thinking...';
            document.getElementById('status-badge').style.background = '#d32f2f';
            document.getElementById('hw-info').innerHTML = `⚡ Speed: <span id="nps-val" style="color:#00e5ff;">0</span> kN/s | Threads: <span>${numThreads}</span>`;
            window.searchStartGlobal = Date.now();
            hasSmoothedEval = false;
            activeSearchToken++;
            multiPV = [];

            let bookMove = await checkOpeningBook();
            if (bookMove) {
                game.move(bookMove);
                finishAiMove();
                document.getElementById('commentary').innerText = "Opening Book Move (Local DB).";
                return;
            }

            let tbMove = await checkSyzygy();
            if (tbMove) {
                game.move({ from: tbMove.slice(0, 2), to: tbMove.slice(2, 4), promotion: tbMove[4] || 'q' });
                finishAiMove();
                document.getElementById('commentary').innerText = "Tablebase perfect play hit.";
                return;
            }

            // Shared TT Buffer
            if (!window.ttBuffer) {
                window.ttBuffer = new SharedArrayBuffer(TT_SIZE * 16); // 16 bytes per entry
            }

            // Init workers if needed
            while (workers.length < numThreads) {
                let workerSource = document.getElementById('worker-code').textContent;
                let blob = new Blob([workerSource], { type: 'text/javascript' });
                let w = new Worker(URL.createObjectURL(blob));
                w.onmessage = handleWorkerMsg;
                w.postMessage({ cmd: 'init', id: workers.length, ttBuffer: window.ttBuffer });
                workers.push(w);
            }

            bestGlobalScore = -Infinity;
            bestGlobalMove = null;
            finishedWorkers = 0;

            // Start multiple worker searches (Divergent Engine Personalities based on IDs)
            let timeSec = parseFloat(document.getElementById('think-time').value);
            if (!Number.isFinite(timeSec) || timeSec <= 0) timeSec = 1.5;
            // Watchdog: never allow "3s" to turn into "20s" due to a stuck worker.
            let token = activeSearchToken;
            setTimeout(() => {
                if (!isThinking || token !== activeSearchToken) return;
                for (let w of workers) w.postMessage({ cmd: 'stop', token });
                // Give a short grace period to deliver 'done' messages, then play best-so-far.
                setTimeout(() => {
                    if (!isThinking || token !== activeSearchToken) return;
                    let m = bestGlobalMove;
                    if (!m) {
                        let moves = game.moves({verbose: true});
                        if (moves.length > 0) m = moves[0].from + moves[0].to + (moves[0].promotion || '');
                    }
                    if (m) game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
                    finishAiMove();
                }, 250);
            }, Math.max(500, timeSec * 1000 + 600));
            for (let i = 0; i < numThreads; i++) {
                workers[i].postMessage({
                    cmd: 'search',
                    id: i,
                    totalWorkers: numThreads,
                    token: activeSearchToken,
                    fen: game.fen(),
                    time: timeSec,
                    useNN: document.getElementById('use-nn').checked
                });
            }
        }

        function handleWorkerMsg(e) {
            if (e.data && e.data.token !== undefined && e.data.token !== activeSearchToken) return;
            if (e.data.status === 'info') {
                if (e.data.id === 0) {
                    let evalNorm = (e.data.score * (game.turn() === 'w' ? 1 : -1) / 100);
                    if (!hasSmoothedEval) { smoothedEval = evalNorm; hasSmoothedEval = true; }
                    smoothedEval = smoothedEval * 0.85 + evalNorm * 0.15;
                    document.getElementById('eval-bar').innerText = `Eval: ${smoothedEval.toFixed(2)}`;
                    document.getElementById('eval-text').innerText = smoothedEval.toFixed(1);

                    let fillPerc = 50 + (smoothedEval / 10) * 50;
                    fillPerc = Math.max(0, Math.min(100, fillPerc));
                    document.getElementById('eval-fill').style.height = fillPerc + '%';

                    let pv = multiPV.slice(0, 3).map(x => x.move).join('  ');
                    document.getElementById('commentary').innerText =
                        `Depth: ${e.data.depth} | Nodes: ${e.data.nodes}` + (pv ? ` | PV: ${pv}` : '');

                    let timeTaken = Math.max(1, (Date.now() - window.searchStartGlobal)) / 1000;
                    document.getElementById('nps-val').innerText = (e.data.nodes / timeTaken / 1000).toFixed(1);

                    drawArrow(e.data.move);
                }
            } else if (e.data.status === 'brainstorm') {
                if (e.data.id === 0 && miniBoard) {
                    try { miniBoard.position(e.data.fen, false); } catch (err) { }
                }
            } else if (e.data.status === 'threat') {
                document.getElementById('threat-area').innerText = e.data.msg;
            } else if (e.data.status === 'done') {
                finishedWorkers++;
                if (e.data.move && e.data.score > bestGlobalScore) {
                    bestGlobalScore = e.data.score;
                    bestGlobalMove = e.data.move;
                }
                if (e.data.move) {
                    multiPV.push({ move: e.data.move, score: e.data.score });
                    multiPV.sort((a, b) => b.score - a.score);
                    if (multiPV.length > 4) multiPV.length = 4;
                }

                if (finishedWorkers >= numThreads && isThinking) {
                    let m = bestGlobalMove;
                    if (!m) {
                        let moves = game.moves({verbose: true});
                        if (moves.length > 0) m = moves[0].from + moves[0].to + (moves[0].promotion || '');
                    }
                    if (m) game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
                    finishAiMove();
                }
            }
        }

        function processPremoves() {
            while (premoves.length > 0 && !isThinking && !game.game_over()) {
                let m = premoves.shift();
                let move = game.move(m);
                if (move) {
                    board.position(game.fen());
                    updateLog();
                    triggerNextTurn();
                    break;
                } else {
                    premoves = [];
                    break;
                }
            }
            renderPremoves();
        }

        function finishAiMove() {
            isThinking = false; board.position(game.fen()); updateLog();
            document.getElementById('status-badge').innerText = 'Your Turn';
            document.getElementById('status-badge').style.background = '#4caf50';
            setTimeout(() => document.getElementById('threat-area').innerText = "", 2000);
            triggerNextTurn();
        }

        function resetGame() {
            game.reset(); document.getElementById('bot-arrows').innerHTML = '';

            let uCol = document.getElementById('player-color').value;
            if (uCol === 'r') uCol = Math.random() > 0.5 ? 'w' : 'b';
            staticHumanSide = uCol;

            applyThemes(); updateLog();
            board.orientation(uCol === 'w' ? 'white' : 'black');

            document.getElementById('eval-fill').style.height = '50%';
            document.getElementById('eval-text').innerText = '0.0';

            setTimeout(triggerNextTurn, 300);
        }

        // Set slider to a sensible per-device default (iPad-safe) on first load.
        (function initThreads() {
            let el = document.getElementById('threads');
            if (!el) return;
            let auto = autoThreadCount();
            el.value = String(auto);
        })();

        updateUI(); resetGame();
    </script>
