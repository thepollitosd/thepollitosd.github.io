<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Engine</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <style>
        :root {
            --bg: #1e1e24;
            --panel: #2b2b36;
            --text: #e0e0e0;
            --accent: #4caf50;
            --light-sq: #eeeed2;
            --dark-sq: #769656;
        }

        html {
            touch-action: manipulation;
            overscroll-behavior: none;
        }

        body {
            margin: 0;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #header {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: #1a1a20;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        #header h1 {
            margin: 0;
            font-size: 1.2em;
            font-weight: 600;
        }

        .menu-btn {
            background: #444;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #main-container {
            display: flex;
            flex: 1;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        .side-panel {
            width: 320px;
            background: var(--panel);
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
            z-index: 10;
        }

        #center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
            padding: 20px 10px;
        }

        #status-container {
            width: 100%;
            max-width: 520px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        #board-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            position: relative;
            width: 100%;
            max-width: 520px;
            touch-action: none;
            margin: 0 auto;
            gap: 15px;
        }

        #eval-gauge {
            flex-shrink: 0;
            width: 24px;
            min-width: 24px;
            background: #222;
            border-radius: 4px;
            border: 1px solid #444;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
            position: relative;
        }

        #eval-fill {
            width: 100%;
            background: #fff;
            height: 50%;
            transition: height 0.3s ease, background 0.3s ease;
        }

        #eval-text {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            text-align: center;
            color: #888;
            font-size: 0.75em;
            font-weight: bold;
            mix-blend-mode: difference;
            pointer-events: none;
        }

        #board-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
        }

        #board {
            width: 100%;
        }

        #arrow-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: visible;
        }

        .white-1e1d7 {
            background-color: var(--light-sq) !important;
            color: var(--dark-sq) !important;
        }

        .black-3c85d {
            background-color: var(--dark-sq) !important;
            color: var(--light-sq) !important;
        }

        .premove-square {
            box-shadow: inset 0 0 0 50px rgba(220, 50, 50, 0.6) !important;
        }

        .highlight-selected {
            background-color: rgba(200, 200, 50, 0.5) !important;
        }

        .highlight-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 25%;
            height: 25%;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }

        .highlight-capture {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 6px solid rgba(0, 0, 0, 0.25);
            box-sizing: border-box;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10;
        }

        h2,
        h3 {
            margin: 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #444;
            font-weight: 500;
        }

        .box {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        details {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 6px;
            margin-bottom: 5px;
        }

        summary {
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            user-select: none;
        }

        summary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .details-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid #444;
        }

        .setting {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .setting label {
            font-size: 0.85em;
            color: #bbb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="range"] {
            accent-color: var(--accent);
            height: 15px;
            cursor: pointer;
        }

        input[type="checkbox"] {
            transform: scale(1.3);
            accent-color: var(--accent);
            cursor: pointer;
        }

        select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
        }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: auto;
        }

        button.primary:hover {
            filter: brightness(1.2);
        }

        #moves {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-family: monospace;
            font-size: 1.1em;
            max-height: 100%;
            overflow-y: auto;
        }

        .move-num {
            color: #888;
            text-align: right;
            padding-right: 10px;
        }

        #commentary {
            font-style: italic;
            color: #aaa;
            margin-top: 10px;
            font-size: 0.95em;
            line-height: 1.4;
            min-height: 40px;
            word-wrap: break-word;
        }

        #status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            background: #555;
            font-size: 0.9em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #eval-bar {
            font-size: 1.1em;
            font-weight: bold;
        }

        #hw-info {
            font-size: 0.78em;
            color: #888;
            margin-top: 4px;
            letter-spacing: 0.03em;
        }

        #hw-info span {
            color: #4caf50;
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            #left-panel {
                position: absolute;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 20;
                transition: transform 0.3s ease;
            }

            #right-panel {
                position: absolute;
                right: 0;
                height: 100%;
                transform: translateX(100%);
                z-index: 20;
                transition: transform 0.3s ease;
            }

            .side-panel.open {
                transform: translateX(0) !important;
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            }
        }

        @media (min-width: 1025px) {
            #header {
                display: none;
            }
        }
        .warning-text {
            font-size: 0.75em;
            color: #ff9800;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>

<body>
    <div id="header">
        <button class="menu-btn" onclick="togglePanel('left-panel')">☰ Log</button>
        <h1>V3</h1>
        <button class="menu-btn" onclick="togglePanel('right-panel')">⚙️ Set</button>
    </div>
    <div id="main-container">
        <div id="left-panel" class="side-panel">
            <h2>Game Log</h2>
            <div id="moves"></div>
        </div>
        <div id="center-area" onclick="closePanels()">
            <div id="status-container" class="box">
                <div id="status-badge" style="display:inline-block; margin-bottom:5px;">Your Turn</div>
                <div id="material-tracker"
                    style="display:inline-block; float:right; font-size:1.0em; font-weight:bold; color:#00e5ff;">
                    Material: =</div>
                <div id="eval-bar">Eval: 0.00</div>
                <div id="hw-info">Engine: initializing...</div>
                <div id="commentary">Waiting to start...</div>
                <div id="threat-area" style="color: #f44336; font-weight: bold; font-size: 0.85em; margin-top: 5px;">
                </div>
            </div>
            <div id="board-container">
                <div id="eval-gauge">
                    <div id="eval-fill"></div>
                    <div id="eval-text">0.0</div>
                </div>
                <div id="board-wrapper">
                    <div id="board"></div>
                    <svg id="arrow-svg" xmlns="http://www.w3.org/2000/svg">
                        <g id="user-arrows"></g>
                        <g id="bot-arrows"></g>
                    </svg>
                </div>
            </div>

            <div id="brainstorm-panel"
                style="margin-top: 15px; text-align: center; background: #2a2a2a; padding: 10px; border-radius: 8px;">
                <h4 style="margin: 0 0 10px 0; color: #ccc; font-size: 0.9em; text-transform: uppercase;">Engine Vision
                    (Live FEN)</h4>
                <div id="mini-board"
                    style="width: 250px; margin: 0 auto; border: 2px solid #555; pointer-events: none;"></div>
            </div>
        </div>
        <div id="right-panel" class="side-panel">
            <h2>Settings</h2>
            <button class="primary" onclick="resetGame()">New Game</button>
            <details open>
                <summary>Match Parameters</summary>
                <div class="details-content">
                    <div class="setting">
                        <label>Play Mode</label>
                        <select id="play-mode">
                            <option value="human">You vs Pro AI</option>
                            <option value="stockfish">Pro AI vs Stockfish 16 (API)</option>
                            <option value="ai-self">Pro AI vs Pro AI</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>Play As</label>
                        <select id="player-color">
                            <option value="w">White</option>
                            <option value="b">Black</option>
                            <option value="r">Random</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label><span>Think Time (s)</span> <span id="time-val">3.0s</span></label>
                        <input type="range" id="think-time" min="0.5" max="15" step="0.5" value="3.0"
                            oninput="updateUI()">
                    </div>
                    <div class="setting">
                        <label><span>Workers (Threads)</span> <span id="threads-val">4</span></label>
                        <input type="range" id="threads" min="1" max="16" step="1" value="4" oninput="updateUI()">
                    </div>
                    <div class="setting">
                        <label><span>Opening Book</span> <input type="checkbox" id="use-book" checked></label>
                    </div>
                    <div class="setting">
                        <label><span>Syzygy Tablebases</span> <input type="checkbox" id="use-tb" checked></label>
                    </div>
                    <div class="setting">
                        <label><span>Enable Neural Network</span> <input type="checkbox" id="use-nn" checked></label>
                        <div class="warning-text">⚠️ Neural evaluation is currently not stable</div>
                    </div>
                </div>
            </details>
            <details>
                <summary>Appearance</summary>
                <div class="details-content">
                    <div class="setting">
                        <label>Board Theme</label>
                        <select id="board-theme" onchange="applyThemes()">
                            <option value="classic">Classic Green</option>
                            <option value="wood">Wooden</option>
                            <option value="slate">Slate</option>
                        </select>
                    </div>
                    <div class="setting">
                        <label>Piece Set</label>
                        <select id="piece-theme" onchange="applyThemes()">

            </details>
        </div>

                    if(occ & b) break;
                }
            }
            return at;
        }

        let bb = new BigUint64Array(12);
        let board = new Int8Array(64);
        let turn = 0, ep = -1, castle = 0; // w=0, b=1. castle bits: 1=wK, 2=wQ, 4=bK, 8=bQ
        let hash = 0n;
        let pastStates = [];
        let repetitionStack = [];
        let useNN = true;

        function setFen(fen) {
            bb.fill(0n); board.fill(-1);
            let parts = fen.split(" ");
            let r=7, c=0;
            let parse = {'P':0,'N':1,'B':2,'R':3,'Q':4,'K':5,'p':6,'n':7,'b':8,'r':9,'q':10,'k':11};
            for(let ch of parts[0]) {
                if(ch==="/") { r--; c=0; }
                else if(ch>='1' && ch<='8') c += parseInt(ch);
                else {
                    let p = parse[ch];
                    bb[p] |= bit(r*8+c); board[r*8+c] = p; c++;
                }
            }
            turn = parts[1]==='b'?1:0;
            castle = 0;
            if(parts[2].includes('K')) castle |= 1;
            if(parts[2].includes('Q')) castle |= 2;
            if(parts[2].includes('k')) castle |= 4;
            if(parts[2].includes('q')) castle |= 8;
            ep = parts[3]==='-' ? -1 : (parts[3].charCodeAt(0)-97) + (parseInt(parts[3][1])-1)*8;
            calcHash();
            repetitionStack = [hash];
        }

        function wOcc() { return bb[0]|bb[1]|bb[2]|bb[3]|bb[4]|bb[5]; }
        function bOcc() { return bb[6]|bb[7]|bb[8]|bb[9]|bb[10]|bb[11]; }

        function calcHash() {
            hash = 0n;
            for(let i=0; i<64; i++) if(board[i]!==-1) hash ^= ZOBRIST[board[i]*64+i];
            if(turn===1) hash ^= ZOB_BLACK;
            hash ^= ZOB_CASTLE[castle];
            if(ep!==-1) hash ^= ZOB_EP[ep&7];
        }

        function isAttacked(sq, byBlack) {
            let occ = wOcc() | bOcc();
            let o = byBlack ? 6 : 0;
            if (PAWN_ATTACKS[byBlack ? 0 : 1][sq] & bb[o]) return true;
            if (KNIGHT_ATTACKS[sq] & bb[o+1]) return true;
            if (KING_ATTACKS[sq] & bb[o+5]) return true;
            if (getSliding(sq, occ, 2) & (bb[o+2]|bb[o+4])) return true;
            if (getSliding(sq, occ, 3) & (bb[o+3]|bb[o+4])) return true;
            return false;
        }

        function genMoves(capturesOnly = false, quietOnly = false) {
            let moves = [];
            let o = turn?6:0;
            let occ = wOcc() | bOcc();
            let enemyO = turn ? wOcc() : bOcc();
            let allyO = turn ? bOcc() : wOcc();
            let empty = ~occ;
            
            // Pawns
            let p = bb[o];
            while(p) {
                let [sq, nP] = popLSB(p); p = nP;
                let r = sq>>3;
                let pushSq = sq + (turn?-8:8);
                if (!capturesOnly && (empty & bit(pushSq))) {
                    if ((turn && r===1) || (!turn && r===6)) { // promotion
                        [o+1,o+2,o+3,o+4].forEach(prom => moves.push({f:sq, t:pushSq, c:-1, pce:o, prom, flag:0}));
                    } else {
                        moves.push({f:sq, t:pushSq, c:-1, pce:o, prom:-1, flag:0});
                        let dblSq = sq + (turn?-16:16);
                        if (((turn && r===6) || (!turn && r===1)) && (empty & bit(dblSq))) moves.push({f:sq, t:dblSq, c:-1, pce:o, prom:-1, flag:4});
                    }
                }
                let att = PAWN_ATTACKS[turn][sq] & enemyO;
                while(att) {
                    let [tsq, nAtt] = popLSB(att); att = nAtt;
                    if (!quietOnly) {
                        if ((turn && r===1) || (!turn && r===6)) {
                            [o+1,o+2,o+3,o+4].forEach(prom => moves.push({f:sq, t:tsq, c:board[tsq], pce:o, prom, flag:0}));
                        } else {
                            moves.push({f:sq, t:tsq, c:board[tsq], pce:o, prom:-1, flag:0});
                        }
                    }
                }
                if (ep !== -1 && !quietOnly) {
                    if (PAWN_ATTACKS[turn][sq] & bit(ep)) {
                        moves.push({f:sq, t:ep, c:board[ep + (turn?8:-8)], pce:o, prom:-1, flag:1});
                    }
                }
            }

            // Knights & King
            let pts = [ [o+1, KNIGHT_ATTACKS], [o+5, KING_ATTACKS] ];
            for(let [pce, attMap] of pts) {
                let p = bb[pce];
                while(p) {
                    let [sq, nP] = popLSB(p); p = nP;
                    let m = attMap[sq] & ~allyO;
                    if(capturesOnly) m &= enemyO;
                    while(m) {
                        let [tsq, nM] = popLSB(m); m = nM;
                        if (quietOnly && board[tsq] !== -1) continue;
                        if (capturesOnly && board[tsq] === -1) continue;
                        moves.push({f:sq, t:tsq, c:board[tsq], pce:pce, prom:-1, flag:0});
                    }
                }
            }

            // Sliding
            for(let t=2; t<=4; t++) {
                let p = bb[o+t];
                while(p) {
                    let [sq, nP] = popLSB(p); p = nP;
                    let m = getSliding(sq, occ, t) & ~allyO;
                    if(capturesOnly) m &= enemyO;
                    while(m) {
                        let [tsq, nM] = popLSB(m); m = nM;
                        if (quietOnly && board[tsq] !== -1) continue;
                        if (capturesOnly && board[tsq] === -1) continue;
                        moves.push({f:sq, t:tsq, c:board[tsq], pce:o+t, prom:-1, flag:0});
                    }
                }
            }

            // Castling
            if (!capturesOnly) {
                if(turn===0) {
                    if ((castle&1) && !(occ&0x60n) && !isAttacked(4,1) && !isAttacked(5,1) && !isAttacked(6,1)) moves.push({f:4, t:6, c:-1, pce:5, prom:-1, flag:2});
                    if ((castle&2) && !(occ&0xEn) && !isAttacked(4,1) && !isAttacked(3,1) && !isAttacked(2,1)) moves.push({f:4, t:2, c:-1, pce:5, prom:-1, flag:2});
                } else {
                    if ((castle&4) && !(occ&(0x60n<<56n)) && !isAttacked(60,0) && !isAttacked(61,0) && !isAttacked(62,0)) moves.push({f:60, t:62, c:-1, pce:11, prom:-1, flag:2});
                    if ((castle&8) && !(occ&(0xEn<<56n)) && !isAttacked(60,0) && !isAttacked(59,0) && !isAttacked(58,0)) moves.push({f:60, t:58, c:-1, pce:11, prom:-1, flag:2});
                }
            }

            return moves;
        }

        // TIER 5 / TIER 1 Move Making + Zobrist hashing incrementally
        function makeMove(m) {
            pastStates.push({ep, castle, hash});
            hash ^= ZOB_CASTLE[castle];
            if(ep!==-1) hash ^= ZOB_EP[ep&7];

            let {f, t, pce, c, prom, flag} = m;
            bb[pce] ^= bit(f); board[f] = -1; hash ^= ZOBRIST[pce*64 + f];

            if (c !== -1) {
                if (flag===1) { // EP capture
                    let cs = t + (turn?8:-8);
                    bb[c] ^= bit(cs); board[cs] = -1; hash ^= ZOBRIST[c*64 + cs];
                } else {
                    bb[c] ^= bit(t); hash ^= ZOBRIST[c*64 + t];
                }
            }
            let np = prom!==-1 ? prom : pce;
            bb[np] |= bit(t); board[t] = np; hash ^= ZOBRIST[np*64 + t];

            if (flag===2) { // Castling rook moves
                if(t===6){ bb[3]^=bit(7)|bit(5); board[7]=-1; board[5]=3; hash^=ZOBRIST[3*64+7]^ZOBRIST[3*64+5]; }
                else if(t===2){ bb[3]^=bit(0)|bit(3); board[0]=-1; board[3]=3; hash^=ZOBRIST[3*64+0]^ZOBRIST[3*64+3]; }
                else if(t===62){ bb[9]^=bit(63)|bit(61); board[63]=-1; board[61]=9; hash^=ZOBRIST[9*64+63]^ZOBRIST[9*64+61]; }
                else if(t===58){ bb[9]^=bit(56)|bit(59); board[56]=-1; board[59]=9; hash^=ZOBRIST[9*64+56]^ZOBRIST[9*64+59]; }
            }

            ep = (flag===4) ? (t + (turn?8:-8)) : -1;
            
            // Castle rights invalidation
            if (pce===5) castle &= 12;
            else if (pce===11) castle &= 3;
            if (f===0 || t===0) castle &= 13;
            if (f===7 || t===7) castle &= 14;
            if (f===56 || t===56) castle &= 7;
            if (f===63 || t===63) castle &= 11;

            turn ^= 1;
            hash ^= ZOB_BLACK;
            hash ^= ZOB_CASTLE[castle];
            if(ep!==-1) hash ^= ZOB_EP[ep&7];
            repetitionStack.push(hash);
        }

        function unmakeMove(m) {
            let {f, t, pce, c, prom, flag} = m;
            turn ^= 1;
            let s = pastStates.pop();
            ep = s.ep; castle = s.castle; hash = s.hash;
            repetitionStack.pop();

            let np = prom!==-1 ? prom : pce;
            bb[np] ^= bit(t); board[t] = (c!==-1 && flag!==1) ? c : -1;
            bb[pce] |= bit(f); board[f] = pce;

            if (c !== -1) {
                if (flag===1) { let cs = t + (turn?8:-8); bb[c] |= bit(cs); board[cs] = c; }
                else { bb[c] |= bit(t); }
            }
            if (flag===2) {
                if(t===6){ bb[3]^=bit(7)|bit(5); board[7]=3; board[5]=-1; }
                else if(t===2){ bb[3]^=bit(0)|bit(3); board[0]=3; board[3]=-1; }
                else if(t===62){ bb[9]^=bit(63)|bit(61); board[63]=9; board[61]=-1; }
                else if(t===58){ bb[9]^=bit(56)|bit(59); board[56]=9; board[59]=-1; }
            }
        }

        // TIER 3: EVALUATION UPGRADE (FULL PST + MOBILITY + 3-PHASE TAPERED EVAL)
        const V = [100, 320, 330, 500, 900, 20000];
        
        // OPENING TABLE: Forces extremely strong development and rapid castling
        const PST_O = [
            // Pawns: Strongly reward central pushes, penalize edge pawn pushes
            [0,0,0,0,0,0,0,0, 50,50,50,50,50,50,50,50, 10,10,20,30,30,20,10,10, 5,5,10,40,40,10,5,5, 0,0,0,30,30,0,0,0, 5,-5,-20,0,0,-20,-5,5, 5,10,10,-30,-30,10,10,5, 0,0,0,0,0,0,0,0],
            // Knights: Massive penalty (-50) for staying on b1/g1
            [-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-50,-30,-30,-30,-30,-50,-50],
            // Bishops: Penalty (-40) for undeveloped c1/f1
            [-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-40,-10,-10,-40,-10,-20],
            // Rooks: Reward moving towards center (d1, e1)
            [0,0,0,0,0,0,0,0, 5,10,10,10,10,10,10,5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, 0,0,10,15,15,10,0,0],
            // Queens: Penalty for early roaming, safe on d1 (+20)
            [-20,-10,-10,-5,-5,-10,-10,-20, -10,0,0,0,0,0,0,-10, -10,0,5,5,5,5,0,-10, -5,0,5,5,5,5,0,-5, 0,0,5,5,5,5,0,-5, -10,5,5,5,5,5,0,-10, -20,-20,-20,-20,-20,-20,-20,-20, -20,-20,-20, 20,-20,-20,-20,-20],
            // King: Extremely high reward for pure castling (g1/c1 = +50), massive penalty for uncastled center e1 (-40)
            [-30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -20,-30,-30,-40,-40,-30,-30,-20, -10,-20,-20,-20,-20,-20,-20,-10, 20,20,-20,-20,-20,-20,20,20, 20,20,50,-30,-40,-30,50,20]
        ];

        const PST = [
            // Pawns
            [0,0,0,0,0,0,0,0, 50,50,50,50,50,50,50,50, 10,10,20,30,30,20,10,10, 5,5,10,25,25,10,5,5, 0,0,0,20,20,0,0,0, 5,-5,-10,0,0,-10,-5,5, 5,10,10,-20,-20,10,10,5, 0,0,0,0,0,0,0,0],
            // Knights
            [-50,-40,-30,-30,-30,-30,-40,-50,-40,-20,0,0,0,0,-20,-40,-30,0,10,15,15,10,0,-30,-30,5,15,20,20,15,5,-30,-30,0,15,20,20,15,0,-30,-30,5,10,15,15,10,5,-30,-40,-20,0,5,5,0,-20,-40,-50,-40,-30,-30,-30,-30,-40,-50],
            // Bishops
            [-20,-10,-10,-10,-10,-10,-10,-20,-10,0,0,0,0,0,0,-10,-10,0,5,10,10,5,0,-10,-10,5,5,10,10,5,5,-10,-10,0,10,10,10,10,0,-10,-10,10,10,10,10,10,10,-10,-10,5,0,0,0,0,5,-10,-20,-10,-10,-10,-10,-10,-10,-20],
            // Rooks
            [0,0,0,0,0,0,0,0, 5,10,10,10,10,10,10,5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, -5,0,0,0,0,0,0,-5, 0,0,0,5,5,0,0,0],
            // Queens
            [-20,-10,-10,-5,-5,-10,-10,-20, -10,0,0,0,0,0,0,-10, -10,0,5,5,5,5,0,-10, -5,0,5,5,5,5,0,-5, 0,0,5,5,5,5,0,-5, -10,5,5,5,5,5,0,-10, -10,0,5,0,0,0,0,-10, -20,-10,-10,-5,-5,-10,-10,-20],
            // King (Midgame)
            [-30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -30,-40,-40,-50,-50,-40,-40,-30, -20,-30,-30,-40,-40,-30,-30,-20, -10,-20,-20,-20,-20,-20,-20,-10, 20,20,0,0,0,0,20,20, 20,30,10,0,0,10,30,20],
            // King (Endgame)
            [-50,-40,-30,-20,-20,-30,-40,-50, -30,-20,-10,0,0,-10,-20,-30, -30,-10,20,30,30,20,-10,-30, -30,-10,30,40,40,30,-10,-30, -30,-10,30,40,40,30,-10,-30, -30,-10,20,30,30,20,-10,-30, -30,-30,0,0,0,0,-30,-30, -50,-30,-30,-30,-30,-30,-30,-50]
        ];
        
        function countBits(bb) {
            let n = 0;
            while (bb) {
                bb &= bb - 1n;
                n++;
            }
            return n;
        }

        function pawnAttackBB(color) {
            let mask = 0n;
            let p = color ? bb[6] : bb[0];
            while (p) {
                let [sq, nP] = popLSB(p);
                p = nP;
                mask |= PAWN_ATTACKS[color ? 1 : 0][sq];
            }
            return mask;
        }

        function nnReady() {
            return typeof NN_WEIGHTS !== 'undefined' && NN_WEIGHTS && NN_WEIGHTS.w1 && NN_WEIGHTS.w1.length > 0;
        }

        function nnPredict(features) {
            if (!nnReady()) return 0;
            let normalized = new Array(features.length);
            for (let i = 0; i < features.length; i++) {
                normalized[i] = (features[i] - NN_WEIGHTS.feature_mean[i]) / NN_WEIGHTS.feature_std[i];
            }

            let h1 = new Array(NN_WEIGHTS.w1.length);
            for (let i = 0; i < NN_WEIGHTS.w1.length; i++) {
                let total = NN_WEIGHTS.b1[i];
                let row = NN_WEIGHTS.w1[i];
                for (let j = 0; j < row.length; j++) total += row[j] * normalized[j];
                h1[i] = Math.tanh(total);
            }

            let h2 = new Array(NN_WEIGHTS.w2.length);
            for (let i = 0; i < NN_WEIGHTS.w2.length; i++) {
                let total = NN_WEIGHTS.b2[i];
                let row = NN_WEIGHTS.w2[i];
                for (let j = 0; j < row.length; j++) total += row[j] * h1[j];
                h2[i] = Math.tanh(total);
            }

            let out = NN_WEIGHTS.b3;
            for (let i = 0; i < NN_WEIGHTS.w3.length; i++) out += NN_WEIGHTS.w3[i] * h2[i];
            return out * 1000;
        }

        function evaluate() {
            let op = 0, mg = 0, eg = 0;
            let gamePhase = 0;
            let wOcc = bb[0]|bb[1]|bb[2]|bb[3]|bb[4]|bb[5];
            let bOcc = bb[6]|bb[7]|bb[8]|bb[9]|bb[10]|bb[11];
            let occ = wOcc | bOcc;
            let whitePawnAttacks = pawnAttackBB(0);
            let blackPawnAttacks = pawnAttackBB(1);
            let materialTerms = [];

            for(let p=0; p<6; p++) {
                let whiteCount = 0, blackCount = 0;
                let mask = bb[p];
                while(mask) {
                    let [sq, nM] = popLSB(mask); mask = nM;
                    whiteCount++;
                    op += V[p] + (p===5 ? PST_O[5][63-sq] : PST_O[p][63-sq]);
                    mg += V[p] + (p===5 ? PST[5][63-sq] : PST[p][63-sq]);
                    eg += V[p] + (p===5 ? PST[6][63-sq] : PST[p][63-sq]);
                    if(p===1 || p===2) gamePhase += 1;
                    else if(p===3) gamePhase += 2;
                    else if(p===4) gamePhase += 4;
                }
                mask = bb[p+6];
                while(mask) {
                    let [sq, nM] = popLSB(mask); mask = nM;
                    blackCount++;
                    let mirrored = 63 - sq;
                    op -= V[p] + (p===5 ? PST_O[5][mirrored] : PST_O[p][mirrored]);
                    mg -= V[p] + (p===5 ? PST[5][mirrored] : PST[p][mirrored]);
                    eg -= V[p] + (p===5 ? PST[6][mirrored] : PST[p][mirrored]);
                    if(p===1 || p===2) gamePhase += 1;
                    else if(p===3) gamePhase += 2;
                    else if(p===4) gamePhase += 4;
                }
                materialTerms.push(whiteCount - blackCount);
            }
            
            let phase = gamePhase > 24 ? 24 : gamePhase;
            let opWeight = Math.max(0, (phase - 20) / 4);
            let midEndScores = (mg * phase + eg * (24 - phase)) / 24;
            let score = (op * opWeight) + midEndScores * (1.0 - opWeight);

            // Threat evaluation: reward attacked enemy pieces and penalize undefended own pieces
            let threatScore = 0;
            let attackedWhite = 0, defendedWhite = 0, attackedBlack = 0, defendedBlack = 0;
            for (let p = 0; p < 6; p++) {
                let mask = bb[p];
                while (mask) {
                    let [sq, nM] = popLSB(mask); mask = nM;
                    if (isAttacked(sq, 1)) {
                        attackedWhite++;
                        if (isAttacked(sq, 0)) defendedWhite++;
                        threatScore -= V[p] * (isAttacked(sq, 0) ? 0.15 : 0.5);
                    }
                }
                mask = bb[p+6];
                while (mask) {
                    let [sq, nM] = popLSB(mask); mask = nM;
                    if (isAttacked(sq, 0)) {
                        attackedBlack++;
                        if (isAttacked(sq, 1)) defendedBlack++;
                        threatScore += V[p] * (isAttacked(sq, 1) ? 0.15 : 0.5);
                    }
                }
            }
            score += threatScore;

            // Small tempo bonus for white to balance self-play
            score += 10;

            // Mobility
            let mobility = 0;
            let whiteMobility = 0, blackMobility = 0;
            let wSafePawnZone = blackPawnAttacks;
            let bSafePawnZone = whitePawnAttacks;

            let mobPieces = [
                {mask: bb[1], att: KNIGHT_ATTACKS, weight: 4, own: wOcc, enemyPawn: wSafePawnZone, side: 0},
                {mask: bb[2], att: null, weight: 4, own: wOcc, enemyPawn: wSafePawnZone, type: 2, side: 0},
                {mask: bb[3], att: null, weight: 2, own: wOcc, enemyPawn: wSafePawnZone, type: 3, side: 0},
                {mask: bb[4], att: null, weight: 1, own: wOcc, enemyPawn: wSafePawnZone, type: 0, side: 0},
                {mask: bb[7], att: KNIGHT_ATTACKS, weight: 4, own: bOcc, enemyPawn: bSafePawnZone, side: 1},
                {mask: bb[8], att: null, weight: 4, own: bOcc, enemyPawn: bSafePawnZone, type: 2, side: 1},
                {mask: bb[9], att: null, weight: 2, own: bOcc, enemyPawn: bSafePawnZone, type: 3, side: 1},
                {mask: bb[10], att: null, weight: 1, own: bOcc, enemyPawn: bSafePawnZone, type: 0, side: 1}
            ];
            for (let piece of mobPieces) {
                let p = piece.mask;
                while(p) {
                    let [sq, nP] = popLSB(p);
                    p = nP;
                    let att = piece.att ? piece.att[sq] : getSliding(sq, occ, piece.type);
                    att &= ~piece.own;
                    att &= ~piece.enemyPawn;
                    let bonus = countBits(att) * piece.weight;
                    mobility += bonus;
                    if (piece.side === 0) whiteMobility += bonus;
                    else blackMobility += bonus;
                }
            }
            score += mobility;

            // Pawn structure
            let isolatedPenalty = 15;
            let doubledPenalty = 18;
            let doubledWhite = 0, doubledBlack = 0, isolatedWhite = 0, isolatedBlack = 0;
            let pawnFileCountsW = new Array(8).fill(0);
            let pawnFileCountsB = new Array(8).fill(0);
            for (let f = 0; f < 8; f++) {
                pawnFileCountsW[f] = countBits(bb[0] & FILES[f]);
                pawnFileCountsB[f] = countBits(bb[6] & FILES[f]);
                if (pawnFileCountsW[f] > 1) { doubledWhite += pawnFileCountsW[f] - 1; score -= (pawnFileCountsW[f] - 1) * doubledPenalty; }
                if (pawnFileCountsB[f] > 1) { doubledBlack += pawnFileCountsB[f] - 1; score += (pawnFileCountsB[f] - 1) * doubledPenalty; }
                if (pawnFileCountsW[f] > 0) {
                    let adj = 0n;
                    if (f > 0) adj |= bb[0] & FILES[f-1];
                    if (f < 7) adj |= bb[0] & FILES[f+1];
                    if (adj === 0n) { isolatedWhite += pawnFileCountsW[f]; score -= pawnFileCountsW[f] * isolatedPenalty; }
                }
                if (pawnFileCountsB[f] > 0) {
                    let adj = 0n;
                    if (f > 0) adj |= bb[6] & FILES[f-1];
                    if (f < 7) adj |= bb[6] & FILES[f+1];
                    if (adj === 0n) { isolatedBlack += pawnFileCountsB[f]; score += pawnFileCountsB[f] * isolatedPenalty; }
                }
            }

            let wPawns = bb[0];
            let passedWhite = 0, passedBlack = 0;
            while (wPawns) {
                let [sq, nP] = popLSB(wPawns); wPawns = nP;
                let file = sq & 7;
                let adj = FILES[file];
                if (file > 0) adj |= FILES[file-1];
                if (file < 7) adj |= FILES[file+1];
                if (!(bb[6] & adj)) {
                    passedWhite++;
                    let rank = sq >> 3;
                    let bonus = 25 + rank * 10;
                    let passScale = 1 + (24 - phase) / 24;
                    score += Math.floor(bonus * passScale);
                }
            }
            let bPawns = bb[6];
            while (bPawns) {
                let [sq, nP] = popLSB(bPawns); bPawns = nP;
                let file = sq & 7;
                let adj = FILES[file];
                if (file > 0) adj |= FILES[file-1];
                if (file < 7) adj |= FILES[file+1];
                if (!(bb[0] & adj)) {
                    passedBlack++;
                    let rank = 7 - (sq >> 3);
                    let bonus = 25 + rank * 10;
                    let passScale = 1 + (24 - phase) / 24;
                    score -= Math.floor(bonus * passScale);
                }
            }

            // Bishop Pairs
            let wB = bb[2], bB = bb[8], c=0, bishopPair = 0;
            while(wB) { wB &= wB - 1n; c++; } if(c>=2) { score += 35; bishopPair += 1; }
            c=0; while(bB) { bB &= bB - 1n; c++; } if(c>=2) { score -= 35; bishopPair -= 1; }

            // Outposts
            let outpostBonus = 30;
            let outpost = 0;
            let wk = bb[1];
            while (wk) {
                let [sq, nwk] = popLSB(wk); wk = nwk;
                let rank = sq >> 3;
                if (rank >= 3 && rank <= 5) {
                    let defended = false;
                    let pawnAttacks = PAWN_ATTACKS[1][sq];
                    if (pawnAttacks & bb[0]) defended = true;
                    let enemyPawnAttacks = PAWN_ATTACKS[0][sq];
                    if (!(enemyPawnAttacks & bb[6]) && defended) { score += outpostBonus; outpost += 1; }
                }
            }
            let bk = bb[7];
            while (bk) {
                let [sq, nbk] = popLSB(bk); bk = nbk;
                let rank = sq >> 3;
                if (rank >= 2 && rank <= 4) {
                    let defended = false;
                    let pawnAttacks = PAWN_ATTACKS[0][sq];
                    if (pawnAttacks & bb[6]) defended = true;
                    let enemyPawnAttacks = PAWN_ATTACKS[1][sq];
                    if (!(enemyPawnAttacks & bb[0]) && defended) { score -= outpostBonus; outpost -= 1; }
                }
            }

            // Rook on 7th
            let rook7Bonus = 25;
            let rook7th = 0;
            let wr = bb[3];
            while (wr) {
                let [sq, nwr] = popLSB(wr); wr = nwr;
                if ((sq >> 3) === 6) { score += rook7Bonus; rook7th += 1; }
            }
            let brr = bb[9];
            while (brr) {
                let [sq, nbrr] = popLSB(brr); brr = nbrr;
                if ((sq >> 3) === 1) { score -= rook7Bonus; rook7th -= 1; }
            }

            // Rook Open Files
            let semiOpenRooks = 0, openRooks = 0;
            let wR = bb[3], bR = bb[9];
            while(wR) { 
                let [sq, nM] = popLSB(wR); wR = nM; 
                if(!(bb[0]&FILES[sq&7])) { score+=15; semiOpenRooks += 1; } 
                if(!(bb[6]&FILES[sq&7]) && !(bb[0]&FILES[sq&7])) { score+=10; openRooks += 1; } 
            }
            while(bR) { 
                let [sq, nM] = popLSB(bR); bR = nM; 
                if(!(bb[6]&FILES[sq&7])) { score-=15; semiOpenRooks -= 1; } 
                if(!(bb[6]&FILES[sq&7]) && !(bb[0]&FILES[sq&7])) { score-=10; openRooks -= 1; } 
            }

            // TIER 3: King safety
            let wKsq = ctz(bb[5]), bKsq = ctz(bb[11]);
            let wShield = kingShelter(0, wKsq);
            let bShield = kingShelter(1, bKsq);
            score += wShield * 12 - (wShield === 0 ? 18 : 0);
            score -= bShield * 12 - (bShield === 0 ? 18 : 0);

            let wKingZone = KING_ATTACKS[wKsq] | bit(wKsq);
            let bKingZone = KING_ATTACKS[bKsq] | bit(bKsq);
            let wDanger = 0, bDanger = 0;
            let wQueenThreat = false, wMinorThreat = false;
            let bQueenThreat = false, bMinorThreat = false;
            let mask = wKingZone;
            while(mask) {
                let [sq, nM] = popLSB(mask); mask = nM;
                if(isAttacked(sq, 1)) wDanger++;
            }
            mask = bKingZone;
            while(mask) {
                let [sq, nM] = popLSB(mask); mask = nM;
                if(isAttacked(sq, 0)) bDanger++;
            }
            let q = bb[10];
            while(q) {
                let [sq, nQ] = popLSB(q); q = nQ;
                if (getSliding(sq, occ, 0) & wKingZone) wQueenThreat = true;
            }
            let n = bb[7];
            while(n) {
                let [sq, nn] = popLSB(n); n = nn;
                if (KNIGHT_ATTACKS[sq] & wKingZone) wMinorThreat = true;
            }
            let b = bb[8];
            while(b) {
                let [sq, nb] = popLSB(b); b = nb;
                if (getSliding(sq, occ, 2) & wKingZone) wMinorThreat = true;
            }
            q = bb[4];
            while(q) {
                let [sq, nQ] = popLSB(q); q = nQ;
                if (getSliding(sq, occ, 0) & bKingZone) bQueenThreat = true;
            }
            n = bb[1];
            while(n) {
                let [sq, nn] = popLSB(n); n = nn;
                if (KNIGHT_ATTACKS[sq] & bKingZone) bMinorThreat = true;
            }
            b = bb[2];
            while(b) {
                let [sq, nb] = popLSB(b); b = nb;
                if (getSliding(sq, occ, 2) & bKingZone) bMinorThreat = true;
            }
            score -= wDanger * 14;
            if (wQueenThreat) score -= 18;
            if (wMinorThreat) score -= 10;
            if (wQueenThreat && wMinorThreat) score -= 15;
            score += bDanger * 14;
            if (bQueenThreat) score += 18;
            if (bMinorThreat) score += 10;
            if (bQueenThreat && bMinorThreat) score += 15;
            let centerSquares = [27, 28, 35, 36];
            let whiteCenter = 0, blackCenter = 0;
            for (let sq of centerSquares) {
                if (isAttacked(sq, 0)) whiteCenter++;
                if (isAttacked(sq, 1)) blackCenter++;
            }
            let centerControl = whiteCenter - blackCenter;
            score += centerControl * 6;

            let development = 0;
            if (!(bb[1] & bit(1))) development++;
            if (!(bb[1] & bit(6))) development++;
            if (!(bb[2] & bit(2))) development++;
            if (!(bb[2] & bit(5))) development++;
            if (!(bb[7] & bit(57))) development--;
            if (!(bb[7] & bit(62))) development--;
            if (!(bb[8] & bit(58))) development--;
            if (!(bb[8] & bit(61))) development--;
            score += development * 8;

            let kingDanger = bDanger - wDanger;
            let kingShelterScore = wShield - bShield;
            let queenPressure = (bQueenThreat ? 1 : 0) - (wQueenThreat ? 1 : 0);
            let minorPressure = (bMinorThreat ? 1 : 0) - (wMinorThreat ? 1 : 0);

            let features = [
                phase / 24,
                op / 20000,
                mg / 20000,
                eg / 20000,
                threatScore / 3000,
                mobility / 200,
                centerControl / 8,
                development / 8,
                kingDanger / 16,
                kingShelterScore / 4,
                queenPressure / 4,
                minorPressure / 4,
                bishopPair,
                outpost / 4,
                rook7th / 4,
                semiOpenRooks / 4,
                openRooks / 4,
                doubledWhite / 8,
                doubledBlack / 8,
                isolatedWhite / 8,
                isolatedBlack / 8,
                passedWhite / 8,
                passedBlack / 8,
                attackedWhite / 16,
                defendedWhite / 16,
                attackedBlack / 16,
                defendedBlack / 16,
                whiteMobility / 200,
                blackMobility / 200,
                turn === 0 ? 1 : -1,
            ];
            for (let term of materialTerms) features.push(term);
            let blended = score;
            if (useNN) {
                let neuralScore = nnPredict(features);
                blended = score * 0.82 + neuralScore * 0.18;
            }

            return turn ? -Math.floor(blended) : Math.floor(blended);
        }

        function see(move) {
            let from = move.f, to = move.t, piece = move.pce, captured = move.c;
            let occ = wOcc() | bOcc();
            let attackers = [];
            // Get all pieces attacking the to-square
            for (let p = 0; p < 12; p++) {
                let mask = bb[p];
                while (mask) {
                    let [sq, nM] = popLSB(mask); mask = nM;
                    if (sq === from) continue;
                    let attacks = 0n;
                    if (p < 6) { // White
                        if (p === 0) attacks = PAWN_ATTACKS[0][sq];
                        else if (p === 1) attacks = KNIGHT_ATTACKS[sq];
                        else if (p === 2) attacks = getSliding(sq, occ, 2);
                        else if (p === 3) attacks = getSliding(sq, occ, 3);
                        else if (p === 4) attacks = getSliding(sq, occ, 0);
                        else if (p === 5) attacks = KING_ATTACKS[sq];
                    } else { // Black
                        if (p === 6) attacks = PAWN_ATTACKS[1][sq];
                        else if (p === 7) attacks = KNIGHT_ATTACKS[sq];
                        else if (p === 8) attacks = getSliding(sq, occ, 2);
                        else if (p === 9) attacks = getSliding(sq, occ, 3);
                        else if (p === 10) attacks = getSliding(sq, occ, 0);
                        else if (p === 11) attacks = KING_ATTACKS[sq];
                    }
                    if (attacks & bit(to)) attackers.push({sq, p, val: V[p % 6]});
                }
            }
            // Sort attackers by value
            attackers.sort((a, b) => a.val - b.val);
            let gain = captured !== -1 ? V[captured % 6] : 0;
            let side = 0; // White starts
            let occ2 = occ ^ bit(from);
            if (captured !== -1) occ2 ^= bit(to);
            let idx = 0;
            while (idx < attackers.length) {
                let attacker = attackers[idx];
                if (attacker.sq === from) { idx++; continue; }
                // Check if the attacker is still attacking
                let attacks = 0n;
                if (attacker.p < 6) {
                    if (attacker.p === 0) attacks = PAWN_ATTACKS[0][attacker.sq];
                    else if (attacker.p === 1) attacks = KNIGHT_ATTACKS[attacker.sq];
                    else if (attacker.p === 2) attacks = getSliding(attacker.sq, occ2, 2);
                    else if (attacker.p === 3) attacks = getSliding(attacker.sq, occ2, 3);
                    else if (attacker.p === 4) attacks = getSliding(attacker.sq, occ2, 0);
                    else if (attacker.p === 5) attacks = KING_ATTACKS[attacker.sq];
                } else {
                    if (attacker.p === 6) attacks = PAWN_ATTACKS[1][attacker.sq];
                    else if (attacker.p === 7) attacks = KNIGHT_ATTACKS[attacker.sq];
                    else if (attacker.p === 8) attacks = getSliding(attacker.sq, occ2, 2);
                    else if (attacker.p === 9) attacks = getSliding(attacker.sq, occ2, 3);
                    else if (attacker.p === 10) attacks = getSliding(attacker.sq, occ2, 0);
                    else if (attacker.p === 11) attacks = KING_ATTACKS[attacker.sq];
                }
                if (!(attacks & bit(to))) { idx++; continue; }
                // Capture
                gain = V[piece % 6] - gain;
                piece = attacker.p;
                occ2 ^= bit(attacker.sq);
                idx++;
                side ^= 1;
            }
            return gain;
        }

        function computeGamePhase() {
            let gamePhase = 0;
            const phaseVals = [0, 1, 1, 2, 4, 0];
            for (let p = 1; p <= 4; p++) {
                let mask = bb[p];
                while (mask) { mask &= mask - 1n; gamePhase += phaseVals[p]; }
                mask = bb[p + 6];
                while (mask) { mask &= mask - 1n; gamePhase += phaseVals[p]; }
            }
            return gamePhase;
        }

        function isRepetition() {
            let seen = 0;
            for (let i = repetitionStack.length - 1; i >= 0; i--) {
                if (repetitionStack[i] === hash) {
                    seen++;
                    if (seen >= 3) return true;
                }
            }
            return false;
        }

        function kingShelter(color, kingSq) {
            let pawn = color === 0 ? 0 : 6;
            let file = kingSq & 7;
            let offsets = color === 0 ? [7, 8, 9] : [-9, -8, -7];
            let shield = 0;
            for (let off of offsets) {
                let sq = kingSq + off;
                if (sq < 0 || sq >= 64) continue;
                if (Math.abs((sq & 7) - file) > 1) continue;
                if (board[sq] === pawn) shield++;
            }
            return shield;
        }

        // TIER 1, 2: ASPIRATION, NMP, PVS, TT
        const TT_SIZE = 1 << 20; // 1,048,576 entries
        const TT_MASK = TT_SIZE - 1;
        // TODO: Use SharedArrayBuffer for SMP shared TT
        const TT = new Array(TT_SIZE);
        let nodes = 0;
        let timeUp = false;
        let limitMs = 0; // hard limit
        let softLimitMs = 0;
        let startTime = 0;
        let lastBrainstorm = 0;
        
        function exportFEN() {
            let pStr = ['P','N','B','R','Q','K','p','n','b','r','q','k'];
            let fen = '';
            for(let r=7; r>=0; r--) {
                let e = 0;
                for(let f=0; f<8; f++) {
                    let sq = r*8 + f;
                    let found = false;
                    for(let i=0; i<12; i++) {
                        if(bb[i] & (1n << BigInt(sq))) {
                            if(e>0) { fen+=e; e=0; }
                            fen += pStr[i];
                            found = true;
                            break;
                        }
                    }
                    if(!found) e++;
                }
                if(e>0) fen+=e;
                if(r>0) fen+='/';
            }
            return fen + ' w - - 0 1'; 
        }
        
        let killerMoves = new Array(100).fill(0).map(()=>[null, null]);
        let history = new Array(2).fill(0).map(()=>new Array(64).fill(0).map(()=>new Array(64).fill(0)));
        let counterMoves = new Array(12).fill(0).map(() => new Array(64).fill(null));
        let currentMaterialBalance = 0;

        function search(depth, rootMoves, alpha, beta) {
            nodes=0; timeUp=false; startTime = Date.now();
            let bMove = null, bScore = -Infinity;
            killerMoves = new Array(100).fill(0).map(()=>[null, null]);
            history = new Array(2).fill(0).map(()=>new Array(64).fill(0).map(()=>new Array(64).fill(0)));
            counterMoves = new Array(12).fill(0).map(() => new Array(64).fill(null));
            // IID and Aspiration Windows
            for(let d=1; d<=depth; d++) {
                if(timeUp) break;
                if (rootMoves && bMove) {
                    rootMoves.sort((a, b) => (moveEquals(a, bMove) ? 1 : 0) - (moveEquals(b, bMove) ? 1 : 0));
                    rootMoves.reverse();
                }
                let a = d>2 ? bScore - 40 : -50000;
                let b = d>2 ? bScore + 40 : 50000;
                
                while(true) {
                    let {score, move} = alphaBeta(d, 0, rootMoves||null, a, b);
                    if(timeUp) break;
                    if(score <= a) { a = Math.max(a - 200, -50000); }
                    else if(score >= b) { b = Math.min(b + 200, 50000); }
                    else {
                        bScore = score;
                        if(move) bMove = move;
                        postMessage({status:'info', depth:d, score: bScore, move: fmt(bMove), nodes, id: self.workerId});
                        break;
                    }
                }
                if (bScore > 40000) break; // Early exit on forced mate
                if (Date.now() - startTime > softLimitMs) break; // Soft bound finished depth
            }
            
            // TIER 5: Blunder Check & Focus
            if (bMove && bScore < -300) {
                postMessage({status:'threat', msg: 'Tactical threat detected!', id: self.workerId});
            }

            return {move: bMove, score: bScore, nodes};
        }

        function fmt(m) {
            let files="abcdefgh", ranks="12345678";
            return m ? files[m.f&7] + ranks[m.f>>3] + files[m.t&7] + ranks[m.t>>3] + (m.prom!==-1 ? "q" : "") : "";
        }

        function moveEquals(a, b) {
            return a && b && a.f === b.f && a.t === b.t && a.prom === b.prom;
        }

        function scoreMove(m, ttMove, ply, lastMove) {
            if (ttMove && moveEquals(m, ttMove)) return 200000;
            if (m.flag === 2) return 180000; // Increased castling priority
            if (m.prom === 4 || m.prom === 10) return 150000;

            let sideMaterial = turn ? -currentMaterialBalance : currentMaterialBalance;
            if (m.c !== -1) {
                let gain = see(m);
                let captureScore = 10000 + gain;
                if (gain < 0) captureScore -= 6000;
                if (sideMaterial < 0 && gain < 50) captureScore -= 8000;
                return captureScore;
            }

            // Strongly penalize non-castling king moves to discourage early king walks
            if (m.pce === 5 && m.flag !== 2) return -10000;

            if (killerMoves[ply] && killerMoves[ply][0] && moveEquals(killerMoves[ply][0], m)) return 9000;
            if (killerMoves[ply] && killerMoves[ply][1] && moveEquals(killerMoves[ply][1], m)) return 8000;
            if (lastMove && counterMoves[lastMove.pce][lastMove.t] && moveEquals(counterMoves[lastMove.pce][lastMove.t], m)) return 7000;
            return history[turn][m.f][m.t] || 0;
        }

        function alphaBeta(depth, ply, rootMoves, alpha, beta, lastMove = null) {
            // TIER 5: Mate Distance Pruning
            let mateVal = 40000 - ply;
            if (alpha < -mateVal) alpha = -mateVal;
            if (beta > mateVal - 1) beta = mateVal - 1;
            if (alpha >= beta) return {score: alpha, move: null};

            if((nodes++ & 4095)===0) {
                let now = Date.now();
                if(now - startTime > limitMs) timeUp = true;
                else if(now - lastBrainstorm >= 100) {
                    lastBrainstorm = now;
                    postMessage({status: 'brainstorm', fen: exportFEN(), id: self.workerId});
                }
            }
            if(timeUp) return {score: alpha, move: null};
            if (ply > 0 && isRepetition()) return {score: 0, move: null};

            let inCheck = isAttacked(ctz(bb[turn?11:5]), turn^1);
            currentMaterialBalance = 0;
            for (let p = 0; p < 6; p++) currentMaterialBalance += (countBits(bb[p]) - countBits(bb[p+6])) * V[p];

            // Check Extension: Search deeper when in check to avoid blunders
            if (inCheck) depth += 1;

            // Zobrist TT
            let ttIndex = Number(hash & BigInt(TT_MASK));
            let tte = TT[ttIndex];
            if (tte && tte.key !== hash) tte = null;
            if(tte && tte.depth >= depth) {
                if(tte.flag === 0) return {score: tte.score, move: tte.move};
                if(tte.flag === 1 && tte.score <= alpha) return {score: tte.score, move: tte.move};
                if(tte.flag === 2 && tte.score >= beta) return {score: tte.score, move: tte.move};
            }

            // Internal Iterative Deepening
            if (depth >= 4 && (!tte || !tte.move) && !inCheck) {
                alphaBeta(depth - 2, ply + 1, null, alpha, beta, lastMove);
                tte = TT[ttIndex];
                if (tte && tte.key !== hash) tte = null;
            }

            if(depth <= 0) return {score: quiesce(alpha, beta), move: null};

            // TIER 3: Reverse Futility Pruning (Static NMP)
            if (depth <= 3 && !inCheck && Math.abs(alpha) < 40000) {
                let staticEval = evaluate();
                if (staticEval - depth * 150 >= beta) return {score: staticEval, move: null};
            }

            // Razoring
            if (!inCheck && depth <= 2) {
                let staticEval = evaluate();
                if (staticEval + 300 < alpha) {
                    return {score: quiesce(alpha, beta), move: null};
                }
            }

            // NMP (Null Move Pruning)
            // Disabling NMP on Worker 2 makes it find deep sacrifices others miss
            let isPV = (beta - alpha > 1);
            if (depth >= 3 && !inCheck && ply > 0 && self.workerId !== 2 && !isPV) {
                let oldTurn = turn, oldEp = ep, oldHash = hash;
                turn ^= 1; ep = -1; calcHash();
                let s = -alphaBeta(depth - 3 - (depth>6 ? 1 : 0), ply+1, null, -beta, -beta+1, null).score;
                turn = oldTurn; ep = oldEp; hash = oldHash;
                if (s >= beta) return {score: beta, move: null};
            }

            // TIER 4: Futility Pruning
            let isFutility = false;
            if (depth === 1 && !inCheck && Math.abs(alpha) < 40000 && evaluate() + 300 < alpha) {
                isFutility = true;
            }

            let ttMove = tte && tte.move ? tte.move : null;
            let captureMoves = [];
            let quietMoves = [];
            if (rootMoves) {
                captureMoves = rootMoves;
            } else {
                captureMoves = genMoves(true, false);
                captureMoves.forEach(m => { m.s = scoreMove(m, ttMove, ply, lastMove); });
                captureMoves.sort((a,b) => b.s - a.s);
                if (!isFutility) {
                    quietMoves = genMoves(false, true);
                    quietMoves.forEach(m => { m.s = scoreMove(m, ttMove, ply, lastMove); });
                    quietMoves.sort((a,b) => b.s - a.s);
                }
            }

            if (captureMoves.length + quietMoves.length === 0) return {score: inCheck ? -40000+ply : 0, move: null};

            let bestMove = null;
            let origAlpha = alpha;
            let movesMade = 0;
            let moveStages = rootMoves ? [captureMoves] : [captureMoves, quietMoves];

            for (let stage = 0; stage < moveStages.length; stage++) {
                let moves = moveStages[stage];
                for (let m of moves) {
                    makeMove(m);
                    if(isAttacked(ctz(bb[turn?5:11]), turn)) { unmakeMove(m); continue; } // illegal
                    movesMade++;
                    let score;
                    let isQuiet = (m.c === -1 && m.prom === -1);
                    let isTt = ttMove && moveEquals(m, ttMove);
                    let isKiller = killerMoves[ply] && ((killerMoves[ply][0] && moveEquals(killerMoves[ply][0], m)) || (killerMoves[ply][1] && moveEquals(killerMoves[ply][1], m)));

                    // TIER 1: PVS
                    if (movesMade === 1) {
                        score = -alphaBeta(depth-1, ply+1, null, -beta, -alpha, m).score;
                    } else {
                        if(depth <= 2 && movesMade > 10 && !inCheck && isQuiet) {
                            unmakeMove(m); continue;
                        }

                        let doLMR = (depth >= 3 && movesMade >= 4 && !inCheck && isQuiet && self.workerId !== 3 && !isTt && !isKiller);
                        if (doLMR) {
                            let reduction = Math.max(1, Math.floor(Math.log(depth) * Math.log(movesMade) / 1.5));
                            score = -alphaBeta(depth - 1 - reduction, ply+1, null, -alpha-1, -alpha, m).score;
                            if (score > alpha) {
                                score = -alphaBeta(depth-1, ply+1, null, -alpha-1, -alpha, m).score;
                                if(score > alpha && score < beta) {
                                    score = -alphaBeta(depth-1, ply+1, null, -beta, -alpha, m).score;
                                }
                            }
                        } else {
                            score = -alphaBeta(depth-1, ply+1, null, -alpha-1, -alpha, m).score;
                            if(score > alpha && score < beta) {
                                score = -alphaBeta(depth-1, ply+1, null, -beta, -alpha, m).score;
                            }
                        }
                    }
                    unmakeMove(m);
                    if(timeUp) return {score: alpha, move: bestMove};

                    if(score > alpha) {
                        alpha = score; bestMove = m;
                        if(score >= beta) {
                            if (m.c === -1 && m.prom === -1) {
                                let bonus = depth * depth;
                                history[turn][m.f][m.t] += bonus - (history[turn][m.f][m.t] * Math.abs(bonus) / 324);
                                if (!killerMoves[ply][0] || (killerMoves[ply][0].f !== m.f || killerMoves[ply][0].t !== m.t)) {
                                    killerMoves[ply][1] = killerMoves[ply][0];
                                    killerMoves[ply][0] = m;
                                }
                            }
                            if (lastMove) counterMoves[lastMove.pce][lastMove.t] = m;
                            break;
                        }
                    }
                }
                if (alpha >= beta) break;
                if (timeUp) return {score: alpha, move: bestMove};
            }

            if(movesMade===0) return {score: inCheck ? -40000+ply : 0, move: null};

            TT[ttIndex] = { key: hash, depth, score: alpha, flag: alpha<=origAlpha ? 1 : (alpha>=beta ? 2 : 0), move: bestMove };

            return {score: alpha, move: bestMove};
        }

        // TIER 2: Quiescence
        function quiesce(alpha, beta) {
            if((nodes++ & 4095)===0 && Date.now() - startTime > limitMs) timeUp = true;
            if(timeUp) return alpha;
            
            let stand_pat = evaluate();
            if(stand_pat >= beta) return beta;
            if(stand_pat > alpha) alpha = stand_pat;

            let inCheck = isAttacked(ctz(bb[turn?5:11]), turn);
            let moves;
            if (inCheck) {
                moves = genMoves(false); // All moves if in check
                moves.forEach(m => { m.s = scoreMove(m, null, 0, null); });
                moves.sort((a,b) => b.s - a.s);
            } else {
                moves = genMoves(true); // Captures only
                moves.sort((a,b) => ((V[b.c%6]||0)*10 - (V[b.pce%6]||0)) - ((V[a.c%6]||0)*10 - (V[a.pce%6]||0)));
            }
            
            let gamePhase = computeGamePhase();
            for(let m of moves) {
                if (!inCheck && m.c !== -1 && see(m) < 0) continue; // Only prune bad captures if not in check
                // TIER 4: Delta Pruning
                if (!inCheck && m.prom === -1 && stand_pat + (V[m.c%6] || 0) + 200 < alpha && gamePhase > 10) {
                    continue; 
                }

                makeMove(m);
                if(isAttacked(ctz(bb[turn?5:11]), turn)) { unmakeMove(m); continue; }
                let s = -quiesce(-beta, -alpha);
                unmakeMove(m);
                if(timeUp) return alpha;
                if(s >= beta) return beta;
                if(s > alpha) alpha = s;
            }
            return alpha;
        }

        initPrecomputes();

        self.onmessage = function(e) {
            let msg = e.data;
            if (msg.cmd === 'search') {
                setFen(msg.fen);
                softLimitMs = msg.time * 1000;
                limitMs = Math.max(softLimitMs * 1.5, softLimitMs + 1000);
                useNN = msg.useNN !== false;
                self.workerId = msg.id; // Allow divergent parallel search behaviors
                let rootMoves = genMoves(false, false);
                rootMoves.forEach(m => { m.s = scoreMove(m, null, 0, null); });
                rootMoves.sort((a, b) => b.s - a.s);
                if (msg.totalWorkers > 1 && rootMoves.length > 1) {
                    let shard = rootMoves.filter((_, idx) => idx % msg.totalWorkers === msg.id);
                    if (shard.length > 0) rootMoves = shard;
                }
                let res = search(64, rootMoves, -50000, 50000);
                postMessage({status: 'done', move: fmt(res.move), score: res.score, nodes: res.nodes, id: msg.id});
            }
        };
    </script>

            let ty = (7 - tRank) * sqSize + sqSize / 2;

            let dx = tx - fx, dy = ty - fy;
            let angle = Math.atan2(dy, dx);
            let len = Math.sqrt(dx * dx + dy * dy) - (sqSize * 0.35);

            let line = `<defs>
                           <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">

        async function checkOpeningBook() {
            if (!document.getElementById('use-book').checked) return null;
            let hist = game.history();
            let validNextMoves = [];

            for (let op of OPENINGS) {
                let moves = op.split(" ");
                if (moves.length > hist.length) {
                    let matches = true;
                    for (let i = 0; i < hist.length; i++) {
                        if (moves[i] !== hist[i]) { matches = false; break; }
                    }
                    if (matches) validNextMoves.push(moves[hist.length]);
                }
            }

            if (validNextMoves.length > 0) {
                // Return a random valid continuation
                return validNextMoves[Math.floor(Math.random() * validNextMoves.length)];
            }
            return null;
        }

        async function checkSyzygy() {
            let pieces = game.fen().split(' ')[0].replace(/[^a-zA-Z]/g, '').length;
            if (pieces <= 5 && document.getElementById('use-tb').checked) {
                try {
                    let res = await fetch(`http://tablebase.lichess.ovh/standard?fen=${encodeURIComponent(game.fen())}`);
                    let data = await res.json();
                    if (data && data.moves && data.moves.length > 0) return data.moves[0].uci;
                } catch (e) { }
            }
            return null;
        }

        let bestGlobalScore = -Infinity;
        let bestGlobalMove = null;
        let finishedWorkers = 0;

        function triggerNextTurn() {
            if (game.game_over()) {
                document.getElementById('status-badge').innerText = 'Game Over';
                document.getElementById('status-badge').style.background = '#111';
                setTimeout(() => alert('Game Over!'), 200);
                return;
            }

            let mode = document.getElementById('play-mode').value;
            let aiSide = staticHumanSide === 'w' ? 'b' : 'w';

            if (mode === 'human') {
                if (game.turn() === aiSide) makeAiMove();
                else processPremoves();
            } else if (mode === 'stockfish') {
                if (game.turn() === aiSide) makeAiMove();
                else playStockfishMove();
            } else if (mode === 'ai-self') {
                setTimeout(makeAiMove, 300);
            }
        }

        async function playStockfishMove() {
            if (game.game_over()) return;
            isThinking = true;
            document.getElementById('status-badge').innerText = 'Stockfish 16 Thinking...';
            document.getElementById('status-badge').style.background = '#0a5c88';
            document.getElementById('bot-arrows').innerHTML = '';

            try {
                let res = await fetch(`https://stockfish.online/api/s/v2.php?fen=${encodeURIComponent(game.fen())}&depth=13`);
                if (res.ok) {
                    let data = await res.json();
                    if (data && data.success && data.bestmove) {
                        let parts = data.bestmove.split(' ');
                        let m = parts.length > 1 ? parts[1] : parts[0];
                        game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
                        board.position(game.fen());
                        updateLog();
                        isThinking = false;
                        triggerNextTurn();
                        return;
                    }
                }
            } catch (e) { console.error('Stockfish API fail:', e); }

            document.getElementById('commentary').innerText = "Stockfish Connect Failed. Playing fallback.";
            isThinking = false;
        }

        async function makeAiMove() {
            if (game.game_over()) return;
            isThinking = true;
            document.getElementById('bot-arrows').innerHTML = '';
            document.getElementById('status-badge').innerText = 'AI Thinking...';
            document.getElementById('status-badge').style.background = '#d32f2f';
            document.getElementById('hw-info').innerHTML = `⚡ Speed: <span id="nps-val" style="color:#00e5ff;">0</span> kN/s | Threads: <span>${numThreads}</span>`;
            window.searchStartGlobal = Date.now();

            let bookMove = await checkOpeningBook();
            if (bookMove) {
                game.move(bookMove);
                finishAiMove();
                document.getElementById('commentary').innerText = "Opening Book Move (Local DB).";
                return;
            }

            let tbMove = await checkSyzygy();
            if (tbMove) {
                game.move({ from: tbMove.slice(0, 2), to: tbMove.slice(2, 4), promotion: tbMove[4] || 'q' });
                finishAiMove();
                document.getElementById('commentary').innerText = "Tablebase perfect play hit.";
                return;
            }

            // Init workers if needed
            while (workers.length < numThreads) {
                let weightSource = document.getElementById('nn-weights').textContent.trim();
                let workerSource = `const NN_WEIGHTS = ${weightSource};\n` + document.getElementById('worker-code').textContent;
                let blob = new Blob([workerSource], { type: 'text/javascript' });
                let w = new Worker(URL.createObjectURL(blob));
                w.onmessage = handleWorkerMsg;
                workers.push(w);
            }

            bestGlobalScore = -Infinity;
            bestGlobalMove = null;
            finishedWorkers = 0;

            // Start multiple worker searches (Divergent Engine Personalities based on IDs)
            for (let i = 0; i < numThreads; i++) {
                workers[i].postMessage({
                    cmd: 'search',
                    id: i,
                    totalWorkers: numThreads,
                    fen: game.fen(),
                    time: parseFloat(document.getElementById('think-time').value),
                    useNN: document.getElementById('use-nn').checked
                });
            }
        }

        function handleWorkerMsg(e) {
            if (e.data.status === 'info') {
                if (e.data.id === 0) {
                    let evalNorm = (e.data.score * (game.turn() === 'w' ? 1 : -1) / 100);
                    document.getElementById('eval-bar').innerText = `Eval: ${evalNorm.toFixed(2)}`;
                    document.getElementById('eval-text').innerText = evalNorm.toFixed(1);

                    let fillPerc = 50 + (evalNorm / 10) * 50;
                    fillPerc = Math.max(0, Math.min(100, fillPerc));
                    document.getElementById('eval-fill').style.height = fillPerc + '%';

                    document.getElementById('commentary').innerText = `Depth: ${e.data.depth} | Nodes: ${e.data.nodes}`;

                    let timeTaken = Math.max(1, (Date.now() - window.searchStartGlobal)) / 1000;
                    document.getElementById('nps-val').innerText = (e.data.nodes / timeTaken / 1000).toFixed(1);

                    drawArrow(e.data.move);
                }
            } else if (e.data.status === 'brainstorm') {
                if (e.data.id === 0 && miniBoard) {
                    try { miniBoard.position(e.data.fen, false); } catch (err) { }
                }
            } else if (e.data.status === 'threat') {
                document.getElementById('threat-area').innerText = e.data.msg;
            } else if (e.data.status === 'done') {
                finishedWorkers++;
                let rawScore = e.data.score * (game.turn() === 'w' ? 1 : -1); // normalize to white
                if (e.data.move && e.data.score > bestGlobalScore) {
                    bestGlobalScore = e.data.score;
                    bestGlobalMove = e.data.move;
                }

                if (finishedWorkers >= numThreads) {
                    let m = bestGlobalMove;
                    if (m) game.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m[4] || 'q' });
                    finishAiMove();
                }
            }
        }

        function processPremoves() {
            while (premoves.length > 0 && !isThinking && !game.game_over()) {
                let m = premoves.shift();
                let move = game.move(m);
                if (move) {
                    board.position(game.fen());
                    updateLog();
                    triggerNextTurn();
                    break;
                } else {
                    premoves = [];
                    break;
                }
            }
            renderPremoves();
        }

        function finishAiMove() {
            isThinking = false; board.position(game.fen()); updateLog();
            document.getElementById('status-badge').innerText = 'Your Turn';
            document.getElementById('status-badge').style.background = '#4caf50';
            setTimeout(() => document.getElementById('threat-area').innerText = "", 2000);
            triggerNextTurn();
        }

        function resetGame() {
            game.reset(); document.getElementById('bot-arrows').innerHTML = '';

            let uCol = document.getElementById('player-color').value;
            if (uCol === 'r') uCol = Math.random() > 0.5 ? 'w' : 'b';
            staticHumanSide = uCol;

            applyThemes(); updateLog();
            board.orientation(uCol === 'w' ? 'white' : 'black');

            document.getElementById('eval-fill').style.height = '50%';
            document.getElementById('eval-text').innerText = '0.0';

            setTimeout(triggerNextTurn, 300);
        }

        updateUI(); resetGame();
    </script>
</body>

</html>
