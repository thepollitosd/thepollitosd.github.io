<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chess Engine - Turbo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>

<style>
  :root { 
    --bg: #1e1e24; --panel: #2b2b36; --text: #e0e0e0; --accent: #4caf50; 
    --light-sq: #eeeed2; --dark-sq: #769656; 
  }
  html { touch-action: manipulation; overscroll-behavior: none; }
  body { margin: 0; height: 100vh; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
  
  #header { display: flex; justify-content: space-between; padding: 10px 15px; background: #1a1a20; align-items: center; z-index: 100; border-bottom: 1px solid #333;}
  #header h1 { margin: 0; font-size: 1.2em; font-weight: 600;}
  .menu-btn { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;}
  
  #main-container { display: flex; flex: 1; flex-direction: row; overflow: hidden; position: relative; }
  .side-panel { width: 320px; background: var(--panel); padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; transition: transform 0.3s ease; z-index: 10;}
  #center-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow-y: auto; padding: 20px 10px;}
  
  #status-container { width: 100%; max-width: 520px; margin-bottom: 10px; box-sizing: border-box;}
  #board-container { position: relative; width: 100%; max-width: 520px; touch-action: none; }
  #board { width: 100%; }
  #arrow-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
  
  .white-1e1d7 { background-color: var(--light-sq) !important; color: var(--dark-sq) !important; }
  .black-3c85d { background-color: var(--dark-sq) !important; color: var(--light-sq) !important; }
  
  .premove-square { box-shadow: inset 0 0 0 50px rgba(220, 50, 50, 0.6) !important; }
  .highlight-selected { background-color: rgba(200, 200, 50, 0.5) !important; }
  .highlight-dot::after { content: ''; position: absolute; top: 35%; left: 35%; width: 30%; height: 30%; background: rgba(0,0,0,0.3); border-radius: 50%; pointer-events: none; }
  .highlight-capture::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 6px solid rgba(0,0,0,0.25); box-sizing: border-box; border-radius: 50%; pointer-events: none; }

  h2, h3 { margin: 0; padding-bottom: 5px; border-bottom: 1px solid #444; font-weight: 500;}
  .box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
  
  details { background: rgba(0,0,0,0.15); border-radius: 6px; margin-bottom: 5px; }
  summary { padding: 10px; font-weight: bold; cursor: pointer; outline: none; user-select: none; }
  .details-content { padding: 10px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid #444; }

  .setting { display: flex; flex-direction: column; gap: 5px; }
  .setting label { font-size: 0.85em; color: #bbb; display: flex; justify-content: space-between; align-items: center;}
  input[type="range"] { accent-color: var(--accent); height: 15px; cursor: pointer;} 
  select { background: #333; color: white; border: 1px solid #555; padding: 6px; border-radius: 4px; cursor: pointer;}
  
  button.primary { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: auto;}
  button.secondary { background: #444; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: left; display: flex; justify-content: space-between;}
  
  #moves { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-family: monospace; font-size: 1.1em; max-height: 100%; overflow-y: auto;}
  .move-num { color: #888; text-align: right; padding-right: 10px;}
  #commentary { font-style: italic; color: #aaa; margin-top: 10px; font-size: 0.95em; line-height: 1.4; min-height: 40px; word-wrap: break-word;}
  #status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; background: #555; font-size: 0.9em; margin-bottom: 10px; font-weight: bold;}
  #eval-bar { font-size: 1.1em; font-weight: bold; }

  @media (max-width: 1024px) {
    #left-panel { position: absolute; left: 0; height: 100%; transform: translateX(-100%); z-index: 20;}
    #right-panel { position: absolute; right: 0; height: 100%; transform: translateX(100%); z-index: 20;}
    .side-panel.open { transform: translateX(0) !important; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
  }
</style>
</head>

<body>

<div id="header">
  <button class="menu-btn" onclick="togglePanel('left-panel')">☰ Log</button>
  <h1>Turbo V3</h1>
  <button class="menu-btn" onclick="togglePanel('right-panel')">⚙️ Set</button>
</div>

<div id="persona-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(3px);">
  <div class="modal-content" style="background:var(--panel); width:90%; max-width:500px; max-height:85vh; border-radius:10px; display:flex; flex-direction:column; overflow:hidden;">
    <div class="modal-header" style="padding:15px 20px; background:#1a1a20; display:flex; justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">Select Persona</h2>
      <button class="menu-btn" onclick="closePersonaModal()">×</button>
    </div>
    <div class="modal-body" id="persona-list" style="overflow-y:auto; flex:1;"></div>
  </div>
</div>

<div id="main-container">
  <div id="left-panel" class="side-panel">
    <h2>Game Log</h2>
    <div id="moves"></div>
  </div>

  <div id="center-area" onclick="closePanels()">
    <div id="status-container" class="box">
      <div id="status-badge">Your Turn</div>
      <div id="eval-bar">Eval: 0.00</div>
      <div id="commentary">Waiting...</div>
    </div>
    <div id="board-container">
      <div id="board"></div>
      <svg id="arrow-svg"><g id="user-arrows"></g><g id="bot-arrows"></g></svg>
    </div>
  </div>

  <div id="right-panel" class="side-panel">
    <h2>Turbo Settings</h2>
    
    <details open>
      <summary>Match Controls</summary>
      <div class="details-content">
        <div class="setting"><label>Play As</label><select id="player-color"><option value="w">White</option><option value="b">Black</option><option value="r">Random</option></select></div>
        <div class="setting"><label><span>Bot Elo</span> <span id="elo-val">3000</span></label><input type="range" id="elo" min="800" max="3000" step="100" value="3000" oninput="updateUI()"></div>
        <div class="setting"><label><span>Think Time (s)</span> <span id="time-val">3.0s</span></label><input type="range" id="think-time" min="0.5" max="30" step="0.5" value="3.0" oninput="updateUI()"></div>
        <div class="setting"><label>CPU Threads: <span id="cpu-cores">?</span></label></div>
      </div>
    </details>

    <details open>
      <summary>Persona</summary>
      <div class="details-content">
        <button class="secondary" onclick="openPersonaModal()"><span id="persona-btn-text">Stockfish Base</span><span>▼</span></button>
        <div class="setting"><label><span>Aggression</span> <span id="agg-val">1.0</span></label><input type="range" id="aggression" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updateUI(); customPersona();"></div>
        <div class="setting"><label><span>Greed</span> <span id="greed-val">1.0</span></label><input type="range" id="greed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="updateUI(); customPersona();"></div>
      </div>
    </details>

    <button class="primary" onclick="resetGame()">New Game</button>
  </div>
</div>

<script type="javascript/worker" id="worker-code">
  importScripts('https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js');
  
  let game = new Chess(), nodes = 0, startTime = 0, searchLimitMs = 2000, timeUp = false, cfg = {};
  
  // TURBO: Transposition Table & History
  let tt = new Map();
  let historyTable = Array(2).fill(0).map(() => Array(64).fill(0).map(() => Array(64).fill(0)));
  let killerMoves = [];
  const V = { p: 100, n: 325, b: 335, r: 505, q: 900, k: 20000 };

  const PST = {
    p: [[0,0,0,0,0,0,0,0],[50,50,50,50,50,50,50,50],[10,10,20,30,30,20,10,10],[5,5,10,25,25,10,5,5],[0,0,0,20,20,0,0,0],[5,-5,-10,0,0,-10,-5,5],[5,10,10,-20,-20,10,10,5],[0,0,0,0,0,0,0,0]],
    n: [[-50,-40,-30,-30,-30,-30,-40,-50],[-40,-20,0,0,0,0,-20,-40],[-30,0,10,15,15,10,0,-30],[-30,5,15,20,20,15,5,-30],[-30,0,15,20,20,15,0,-30],[-30,5,10,15,15,10,5,-30],[-40,-20,0,5,5,0,-20,-40],[-50,-40,-30,-30,-30,-30,-40,-50]],
    b: [[-20,-10,-10,-10,-10,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,10,10,5,0,-10],[-10,5,5,10,10,5,5,-10],[-10,0,10,10,10,10,0,-10],[-10,10,10,10,10,10,10,-10],[-10,5,0,0,0,0,5,-10],[-20,-10,-10,-10,-10,-10,-10,-20]],
    r: [[0,0,0,0,0,0,0,0],[5,10,10,10,10,10,10,5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[-5,0,0,0,0,0,0,-5],[0,0,0,5,5,0,0,0]],
    q: [[-20,-10,-10,-5,-5,-10,-10,-20],[-10,0,0,0,0,0,0,-10],[-10,0,5,5,5,5,0,-10],[-5,0,5,5,5,5,0,-5],[0,0,5,5,5,5,0,-5],[-10,5,5,5,5,5,0,-10],[-10,0,5,0,0,0,0,-10],[-20,-10,-10,-5,-5,-10,-10,-20]],
    k_mid: [[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-30,-40,-40,-50,-50,-40,-40,-30],[-20,-30,-30,-40,-40,-30,-30,-20],[-10,-20,-20,-20,-20,-20,-20,-10],[20,20,0,0,0,0,20,20],[20,30,10,0,0,10,30,20]],
    k_end: [[-50,-40,-30,-20,-20,-30,-40,-50],[-30,-20,-10,0,0,-10,-20,-30],[-30,-10,20,30,30,20,-10,-30],[-30,-10,30,40,40,30,-10,-30],[-30,-10,30,40,40,30,-10,-30],[-30,-10,20,30,30,20,-10,-30],[-30,-30,0,0,0,0,-30,-30],[-50,-30,-30,-30,-30,-30,-30,-50]]
  };

  const squareToIndex = s => (s.charCodeAt(0)-97) + (8-parseInt(s[1]))*8;

  function evalBoard() {
    let t=0, wp=0, bp=0, wm=0, bm=0, wk=null, bk=null, b = game.board();
    for(let r=0; r<8; r++) {
      for(let c=0; c<8; c++) {
        let p = b[r][c]; if(!p) continue;
        let isW = p.color==='w', rank = isW ? r : 7-r, val = p.type === 'k' ? V.k : V[p.type] * cfg.greed; 
        if (p.type==='p') { if(isW){wp++; if(r<3)val+=(5-r)*45;}else{bp++; if(r>4)val+=(r-2)*45;} }
        else if (p.type==='k') { let s = val+PST.k_mid[rank][c]; if(isW)wk={r,c,m:PST.k_mid[rank][c],e:PST.k_end[rank][c]};else bk={r,c,m:PST.k_mid[rank][c],e:PST.k_end[rank][c]}; t+=isW?s:-s; }
        else { let s = val+PST[p.type][rank][c]; if(isW){wm+=val;t+=s;}else{bm+=val;t-=s;} }
      }
    }
    if(wm<1500 && bm<1500 && wk && bk) { 
        t -= wk.m - wk.e; t += bk.m - bk.e;
        let d = (Math.max(3-bk.r,bk.r-4)+Math.max(3-bk.c,bk.c-4))*10 + (14-(Math.abs(wk.r-bk.r)+Math.abs(wk.c-bk.c)))*5;
        t += t>300 ? d*20 : t<-300 ? -d*20 : 0;
    }
    return game.turn()==='w'?t:-t;
  }

  function getMoves(depth, ttMove = null) {
    let mvs = game.moves({verbose:true}), turn = game.turn()==='w'?0:1;
    for(let m of mvs){
      let s = 0;
      if (ttMove && m.san === ttMove) s = 2000000;
      else if (m.san.includes('#')) s = 1000000;
      else if (m.flags.includes('c')) s = 100 * V[m.captured] - V[m.piece];
      else if (killerMoves[depth] === m.san) s = 90000;
      else s = historyTable[turn][squareToIndex(m.from)][squareToIndex(m.to)];
      m.score = s;
    }
    return mvs.sort((a,b)=>b.score-a.score);
  }

  function quiesce(alpha, beta) {
    if((nodes++ & 1023)===0 && Date.now()-startTime > searchLimitMs) timeUp = true;
    if(timeUp) return alpha;
    let pat = evalBoard();
    if(pat >= beta) return beta;
    if(pat > alpha) alpha = pat;
    let mvs = game.moves({verbose: true}).filter(m => m.flags.includes('c'));
    for(let m of mvs) {
      game.move(m); let s = -quiesce(-beta, -alpha); game.undo();
      if(s >= beta) return beta;
      if(s > alpha) alpha = s;
    }
    return alpha;
  }

  function alphaBeta(depth, alpha, beta, pline, ply) {
    if((nodes++ & 1023)===0 && Date.now()-startTime > searchLimitMs) timeUp = true;
    if(timeUp) return alpha;

    // TURBO: Transposition Table Lookup
    let fen = game.fen(), entry = tt.get(fen);
    if(entry && entry.depth >= depth) {
      if(entry.type === 'exact') return entry.score;
      if(entry.type === 'lower' && entry.score >= beta) return beta;
      if(entry.type === 'upper' && entry.score <= alpha) return alpha;
    }

    if(depth<=0) return quiesce(alpha, beta);
    let mvs = getMoves(depth, entry?entry.best:null);
    if(mvs.length===0) return game.in_check() ? -90000 + ply : 0; 

    let bestMove = null, oldAlpha = alpha;
    for(let i=0; i<mvs.length; i++) {
      game.move(mvs[i]); let cl = [], s;
      if (depth >= 3 && i > 4 && !mvs[i].flags.includes('c') && !game.in_check()) s = -alphaBeta(depth-2, -beta, -alpha, cl, ply+1);
      else s = -alphaBeta(depth-1, -beta, -alpha, cl, ply+1);
      game.undo();
      if(s >= beta) {
        if(!mvs[i].flags.includes('c')) {
            killerMoves[depth] = mvs[i].san;
            historyTable[game.turn()==='w'?0:1][squareToIndex(mvs[i].from)][squareToIndex(mvs[i].to)] += depth*depth;
        }
        tt.set(fen, {depth, score: beta, type: 'lower', best: mvs[i].san});
        return beta;
      }
      if(s > alpha) { alpha=s; bestMove=mvs[i]; pline.length=0; pline.push(mvs[i], ...cl); }
    }
    tt.set(fen, {depth, score: alpha, type: alpha <= oldAlpha ? 'upper' : 'exact', best: bestMove?bestMove.san:null});
    return alpha;
  }

  self.onmessage = function(e) {
    let { fen, elo, style, greed, aggression, timeLimit } = e.data;
    game.load(fen); searchLimitMs = timeLimit * 1000; startTime = Date.now();
    cfg = { style, greed, aggression, qDepth: elo<2000?4:8 };
    timeUp = false; nodes = 0; killerMoves = [];
    if(nodes === 0) tt.clear(); // Clear TT every new move to keep memory safe

    let targetDepth = elo<1500?4:elo<2500?8:16, bestMove=null, lastScore=0, bestLine=[];
    
    for(let d=1; d<=targetDepth; d++) {
      // TURBO: Aspiration Windows
      let alpha = d<3 ? -Infinity : lastScore - 50, beta = d<3 ? Infinity : lastScore + 50;
      let cl = [];
      let s = alphaBeta(d, alpha, beta, cl, 0);
      
      if (s <= alpha || s >= beta) s = alphaBeta(d, -Infinity, Infinity, cl, 0); // Research full if failed
      
      if(timeUp) break;
      bestMove = cl[0]; lastScore = s; bestLine = cl;
      postMessage({ status: 'thinking', move: bestMove.san, eval: s, line: bestLine, depth: d, nodes });
      if (s > 80000 || s < -80000) break; 
    }
    postMessage({ status: 'done', move: bestMove || getMoves(1)[0], eval: lastScore, line: bestLine, nodes });
  };
</script>

<script>
let game = new Chess(), board = null, currentPremove = null, isBotThinking = false, engineWorker = null, userArrows = [], selectedSquare = null, playerColor = 'w';

const themes = { classic: { light: '#eeeed2', dark: '#769656' }, wood: { light: '#f0d9b5', dark: '#b58863' }, ocean: { light: '#eae9d2', dark: '#4b7399' }, slate: { light: '#98a6b5', dark: '#5c7080' } };
const personaGroups = [{ groupName: "World Champions", personas: [{ name: "Stockfish Base", stats: { agg: 1.0, greed: 1.0, style: 0 } }, { name: "Mikhail Tal", stats: { agg: 2.8, greed: 0.7, style: 4 } }, { name: "Magnus Carlsen", stats: { agg: 1.2, greed: 1.1, style: 1 } }] }];

function buildPersonaModal() {
  let list = document.getElementById("persona-list"); list.innerHTML = "";
  personaGroups.forEach(g => {
    list.innerHTML += `<div style="padding:10px; background:#222; color:var(--accent); font-weight:bold;">${g.groupName}</div>`;
    g.personas.forEach(p => {
      list.innerHTML += `<div class="persona-item" style="padding:15px; cursor:pointer; border-bottom:1px solid #333;" onclick='applyPreset("${p.name}", ${JSON.stringify(p.stats)})'>${p.name}</div>`;
    });
  });
}

function openPersonaModal() { $("#persona-modal").css("display", "flex"); }
function closePersonaModal() { $("#persona-modal").hide(); }

function applyPreset(name, stats) {
  $("#persona-btn-text").text(name);
  $("#aggression").val(stats.agg); $("#greed").val(stats.greed); $("#style").val(stats.style);
  updateUI(); closePersonaModal();
}

function updateUI() {
  $("#elo-val").text($("#elo").val());
  $("#time-val").text($("#think-time").val() + "s");
  $("#cpu-cores").text(navigator.hardwareConcurrency || "1");
  $("#agg-val").text($("#aggression").val()); $("#greed-val").text($("#greed").val());
}

function applyThemes() {
  let b = themes[$("#board-theme").val()];
  document.documentElement.style.setProperty('--light-sq', b.light);
  document.documentElement.style.setProperty('--dark-sq', b.dark);
  if (board) board.destroy();
  board = Chessboard('board', { position: game.fen(), draggable: true, orientation: playerColor === 'w' ? 'white' : 'black', pieceTheme: `https://lichess1.org/assets/piece/${$("#piece-theme").val()}/{piece}.svg`, onDragStart: onDragStart, onDrop: onDrop, onSnapEnd: onSnapEnd });
}

function updateLog() {
  let div = $("#moves"); div.empty(); let h = game.history();
  for (let i=0; i<h.length; i+=2) div.append(`<div class="move-num">${(i/2)+1}.</div><div>${h[i]}</div><div>${h[i+1]||''}</div>`);
  div.scrollTop(div[0].scrollHeight);
}

function drawPV(line) {
  $("#bot-arrows").empty(); if (!line || line.length === 0) return;
  line.slice(0, 3).forEach((m, i) => drawArrowCore(m.from, m.to, i===0 ? "rgba(0, 255, 100, 0.7)" : "rgba(0, 200, 255, 0.5)", 2.5, "bot-arrows"));
}

function drawArrowCore(from, to, color, width, containerId) {
  const f = {a:0,b:1,c:2,d:3,e:4,f:5,g:6,h:7}, r = {1:7,2:6,3:5,4:4,5:3,6:2,7:1,8:0};
  let fx=(f[from[0]]*12.5)+6.25, fy=(r[from[1]]*12.5)+6.25, tx=(f[to[0]]*12.5)+6.25, ty=(r[to[1]]*12.5)+6.25;
  if (playerColor === 'b') { fx=100-fx; fy=100-fy; tx=100-tx; ty=100-ty; }
  let mid = "h"+Math.random();
  document.getElementById(containerId).innerHTML += `<defs><marker id="${mid}" orient="auto" markerWidth="4" markerHeight="6" refX="3.5" refY="3"><path d="M0,0 V6 L4,3 Z" fill="${color}" /></marker></defs><line x1="${fx}%" y1="${fy}%" x2="${tx}%" y2="${ty}%" stroke="${color}" stroke-width="${width}%" marker-end="url(#${mid})" />`;
}

function showLegalMoves(sq) {
  $('.square-55d63').removeClass('highlight-dot highlight-capture highlight-selected');
  $('.square-' + sq).addClass('highlight-selected');
  game.moves({square: sq, verbose: true}).forEach(m => $('.square-' + m.to).addClass(m.captured ? 'highlight-capture' : 'highlight-dot'));
}

function makeAIMove() {
  if (game.game_over()) return;
  isBotThinking = true; $("#status-badge").text("Turbo Calculating...").css("background", "#d32f2f");
  engineWorker.postMessage({ fen: game.fen(), elo: parseInt($("#elo").val()), timeLimit: parseFloat($("#think-time").val()), style: parseInt($("#style").val()), greed: parseFloat($("#greed").val()), aggression: parseFloat($("#aggression").val()) });
}

function onDragStart(s, p) { if (game.game_over() || p[0] !== playerColor) return false; showLegalMoves(s); }
function onDrop(s, t) {
  if (s === t) return 'snapback';
  if (isBotThinking || game.turn() !== playerColor) {
    currentPremove = { from: s, to: t, promotion: 'q' };
    $('.square-55d63').removeClass('premove-square'); $('.square-'+s).addClass('premove-square'); $('.square-'+t).addClass('premove-square');
    return 'snapback';
  }
  let m = game.move({ from: s, to: t, promotion: 'q' });
  if (!m) return 'snapback';
  $('.square-55d63').removeClass('highlight-dot highlight-capture highlight-selected premove-square');
  updateLog(); setTimeout(makeAIMove, 100);
}
function onSnapEnd() { board.position(game.fen()); }

function resetGame() {
  if(engineWorker) engineWorker.terminate();
  let b = new Blob([document.getElementById('worker-code').textContent], {type: 'text/javascript'});
  engineWorker = new Worker(URL.createObjectURL(b));
  engineWorker.onmessage = e => {
    if(e.data.status==='thinking') {
      let ev = e.data.eval; $("#eval-bar").text("Eval: " + (Math.abs(ev)>80000 ? "M"+(ev>0?'+':'-') : (ev*(game.turn()==='w'?-1:1)/100).toFixed(2)));
      drawPV(e.data.line);
    } else {
      game.move(e.data.move); board.position(game.fen()); updateLog(); $("#bot-arrows").empty(); isBotThinking = false;
      $("#status-badge").text("Your Turn").css("background", "#4caf50");
      if(currentPremove) { let pm = currentPremove; currentPremove=null; $('.square-55d63').removeClass('premove-square'); if(game.move(pm)){ board.position(game.fen()); updateLog(); makeAIMove(); } }
    }
  };
  let col = $("#player-color").val(); playerColor = col==='r' ? (Math.random()<0.5?'w':'b') : col;
  game.reset(); applyThemes(); updateLog(); updateUI();
  if(playerColor==='b') makeAIMove();
}

function togglePanel(id) { $("#"+id).toggleClass("open"); }
function closePanels() { if(window.innerWidth <= 1024) $(".side-panel").removeClass("open"); }

buildPersonaModal(); resetGame();
</script>
